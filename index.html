<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal (Google Maps Style)</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }
    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div class="panel">
  <button onclick="setMode('start')">Start</button>
  <button onclick="setMode('end')">End</button>
  <button onclick="runRoute()">Cari Rute</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==========================
// MAP
// ==========================
var map = L.map('map').setView([-7,110],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ==========================
let islands=[];
let nodes=[];
let edges={};

let start=null,end=null;
let startMarker,endMarker,routeLine;
let mode=null;

// ==========================
// LOAD ISLAND
// ==========================
fetch('islands.json')
.then(res=>res.json())
.then(data=>{
  islands=data.islands;

  islands.forEach(i=>{
    i.polygon.push(i.polygon[0]);
    L.polygon(i.polygon,{color:'red'}).addTo(map);
  });

  generateNodes();
  connectGraph();
});

// ==========================
// GEOMETRY
// ==========================
function pointInPolygon(p, vs){
  let x=p[0], y=p[1], inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];

    let intersect=((yi>y)!=(yj>y)) &&
      (x<(xj-xi)*(y-yi)/(yj-yi)+xi);

    if(intersect) inside=!inside;
  }
  return inside;
}

function isBlocked(p){
  for(let isl of islands){
    if(pointInPolygon(p, isl.polygon)) return true;
  }
  return false;
}

// ==========================
// LINE CHECK
// ==========================
function canSee(a,b){
  let steps=20;

  for(let i=0;i<=steps;i++){
    let t=i/steps;
    let p=[
      a[0]+(b[0]-a[0])*t,
      a[1]+(b[1]-a[1])*t
    ];
    if(isBlocked(p)) return false;
  }
  return true;
}

// ==========================
// AUTO GENERATE NODE 🔥
// ==========================
function generateNodes(){

  let step=0.5;

  for(let lat=-10; lat<0; lat+=step){
    for(let lng=105; lng<120; lng+=step){

      let p=[lat,lng];

      if(!isBlocked(p)){
        nodes.push({
          id:nodes.length,
          coord:p
        });
      }
    }
  }

  console.log("Node:",nodes.length);
}

// ==========================
// CONNECT GRAPH 🔥
// ==========================
function connectGraph(){

  nodes.forEach(a=>{
    edges[a.id]=[];

    nodes.forEach(b=>{
      if(a.id===b.id) return;

      if(dist(a.coord,b.coord) < 1){ // radius koneksi
        if(canSee(a.coord,b.coord)){
          edges[a.id].push(b.id);
        }
      }
    });
  });

  console.log("Graph ready");
}

// ==========================
function dist(a,b){
  return Math.hypot(a[0]-b[0],a[1]-b[1]);
}

// ==========================
function nearestNode(p){
  return nodes.reduce((a,b)=>
    dist(p,a.coord)<dist(p,b.coord)?a:b
  );
}

// ==========================
// A*
// ==========================
function astar(startNode,endNode){

  let open=[startNode.id];
  let came={}, g={}, f={};

  g[startNode.id]=0;
  f[startNode.id]=dist(startNode.coord,endNode.coord);

  while(open.length){

    let current=open.reduce((a,b)=>f[a]<f[b]?a:b);

    if(current===endNode.id){
      return reconstruct(came,current);
    }

    open=open.filter(n=>n!==current);

    for(let nb of edges[current]){

      let temp=g[current]+dist(
        nodes[current].coord,
        nodes[nb].coord
      );

      if(g[nb]===undefined || temp<g[nb]){
        came[nb]=current;
        g[nb]=temp;
        f[nb]=temp+dist(nodes[nb].coord,endNode.coord);

        if(!open.includes(nb)) open.push(nb);
      }
    }
  }

  return [];
}

// ==========================
function reconstruct(came,cur){
  let path=[cur];

  while(came[cur]!==undefined){
    cur=came[cur];
    path.push(cur);
  }

  return path.reverse().map(i=>nodes[i].coord);
}

// ==========================
function smooth(path){
  let out=[];

  for(let i=0;i<path.length-1;i++){
    let a=path[i], b=path[i+1];

    for(let t=0;t<=1;t+=0.1){
      out.push([
        a[0]+(b[0]-a[0])*t,
        a[1]+(b[1]-a[1])*t
      ]);
    }
  }

  return out;
}

// ==========================
function runRoute(){

  if(!start||!end){
    alert("Pilih titik!");
    return;
  }

  let s=nearestNode(start);
  let e=nearestNode(end);

  let path=astar(s,e);

  path.unshift(start);
  path.push(end);

  path=smooth(path);

  if(routeLine) map.removeLayer(routeLine);

  routeLine=L.polyline(path,{
    color:'blue',
    weight:4
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

// ==========================
function setMode(m){mode=m;}

map.on('click',e=>{
  let p=[e.latlng.lat,e.latlng.lng];

  if(mode==='start'){
    start=p;
    if(startMarker) map.removeLayer(startMarker);
    startMarker=L.marker(p).addTo(map);
  }

  if(mode==='end'){
    end=p;
    if(endMarker) map.removeLayer(endMarker);
    endMarker=L.marker(p).addTo(map);
  }
});
</script>

</body>
</html>
