<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal (Optimized - Smart Path)</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: absolute;
      top: 15px;
      left: 50px;
      background: rgba(255, 255, 255, 0.9);
      padding: 15px;
      border-radius: 8px;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button {
      padding: 8px 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }
    button:hover { background: #f0f0f0; }
    .info { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>

<div class="panel">
  <strong>Kontrol Rute:</strong><br><br>
  <button onclick="setMode('start')">1. Klik Start</button>
  <button onclick="setMode('end')">2. Klik End</button>
  <button onclick="runRoute()" style="background: #4CAF50; color: white; border: none;">3. Cari Rute</button>
  <div class="info" id="status">Status: Tunggu data pulau...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- KONFIGURASI ---
const GRID_STEP = 0.05; // Lebih kecil = lebih akurat di selat sempit (Saran: 0.03 - 0.08)
const K_NEAREST = 15;   // Jumlah koneksi antar node (Saran: 10 - 20)
const COLLISION_MARGIN = 0.005; // Jarak aman dari pantai

var map = L.map('map').setView([-8.4, 115.1], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let islands = [];
let nodes = [];
let edges = {};
let start = null, end = null;
let startMarker, endMarker, routeLine;
let mode = null;

// --- 1. LOAD DATA ---
fetch('islands.json')
  .then(res => res.json())
  .then(data => {
    islands = data.islands;
    islands.forEach(isl => {
      // Pastikan poligon tertutup
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length - 1]) {
        isl.polygon.push(isl.polygon[0]);
      }
      L.polygon(isl.polygon, {color: 'red', weight: 1, fillOpacity: 0.2}).addTo(map);
    });

    document.getElementById('status').innerText = "Status: Menghitung Node...";
    setTimeout(() => {
      generateNodes();
      connectGraph();
      document.getElementById('status').innerText = "Status: Siap! Silakan pilih rute.";
    }, 100);
  });

// --- 2. GEOMETRY ENGINE ---
function pointInPolygon(p, vs) {
  let x = p[0], y = p[1], inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i][0], yi = vs[i][1];
    let xj = vs[j][0], yj = vs[j][1];
    let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function isBlocked(p) {
  for (let isl of islands) {
    if (pointInPolygon(p, isl.polygon)) return true;
  }
  return false;
}

// Deteksi tabrakan garis yang lebih presisi
function canSee(a, b) {
  let d = dist(a, b);
  // Cek setiap 0.01 derajat (~1km) di sepanjang garis
  let steps = Math.max(10, Math.ceil(d / 0.01)); 
  for (let i = 0; i <= steps; i++) {
    let t = i / steps;
    let p = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
    if (isBlocked(p)) return false;
  }
  return true;
}

function dist(a, b) {
  return Math.hypot(a[0] - b[0], a[1] - b[1]);
}

// --- 3. GRAPH GENERATION ---
function generateNodes() {
  // Area Bali dan sekitarnya
  for (let lat = -9.0; lat < -7.9; lat += GRID_STEP) {
    for (let lng = 114.4; lng < 115.8; lng += GRID_STEP) {
      let p = [lat, lng];
      if (!isBlocked(p)) {
        nodes.push({ id: nodes.length, coord: p });
      }
    }
  }
}

function connectGraph() {
  nodes.forEach(a => {
    edges[a.id] = [];
    let neighbors = nodes
      .filter(b => b.id !== a.id)
      .map(b => ({ id: b.id, d: dist(a.coord, b.coord) }))
      .sort((x, y) => x.d - y.d)
      .slice(0, K_NEAREST);

    neighbors.forEach(n => {
      if (canSee(a.coord, nodes[n.id].coord)) {
        edges[a.id].push(n.id);
      }
    });
  });
}

// --- 4. ALGORITMA A* ---
function astar(startNode, endNode) {
  let open = [startNode.id];
  let cameFrom = {};
  let gScore = {};
  let fScore = {};

  gScore[startNode.id] = 0;
  fScore[startNode.id] = dist(startNode.coord, endNode.coord);

  while (open.length > 0) {
    let currentId = open.reduce((a, b) => fScore[a] < fScore[b] ? a : b);

    if (currentId === endNode.id) {
      return reconstructPath(cameFrom, currentId);
    }

    open = open.filter(id => id !== currentId);

    for (let neighborId of (edges[currentId] || [])) {
      let tentativeG = gScore[currentId] + dist(nodes[currentId].coord, nodes[neighborId].coord);

      if (gScore[neighborId] === undefined || tentativeG < gScore[neighborId]) {
        cameFrom[neighborId] = currentId;
        gScore[neighborId] = tentativeG;
        fScore[neighborId] = tentativeG + dist(nodes[neighborId].coord, endNode.coord);
        if (!open.includes(neighborId)) open.push(neighborId);
      }
    }
  }
  return [];
}

function reconstructPath(cameFrom, current) {
  let path = [current];
  while (cameFrom[current] !== undefined) {
    current = cameFrom[current];
    path.push(current);
  }
  return path.reverse().map(id => nodes[id].coord);
}

// --- 5. UI & EXECUTION ---
function setMode(m) { mode = m; }

map.on('click', e => {
  let p = [e.latlng.lat, e.latlng.lng];
  if (isBlocked(p)) { alert("Titik berada di daratan!"); return; }

  if (mode === 'start') {
    start = p;
    if (startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map).bindPopup("Start").openPopup();
  } else if (mode === 'end') {
    end = p;
    if (endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map).bindPopup("End").openPopup();
  }
});

// GANTI FUNGSI runRoute() LAMA DENGAN INI:

function runRoute() {
  if (!start || !end) { alert("Tentukan Start dan End dulu!"); return; }

  // Hapus rute lama jika ada
  if (routeLine) map.removeLayer(routeLine);

  // Buat ID sementara untuk start dan end
  let sId = nodes.length;
  let eId = nodes.length + 1;
  
  let sNode = { id: sId, coord: start };
  let eNode = { id: eId, coord: end };

  // Tambahkan ke daftar node sementara
  let tempNodes = [...nodes, sNode, eNode];
  
  // Reset edges untuk ID sementara
  edges[sId] = [];
  edges[eId] = [];

  // Strategi penyambungan: Cari 10 node terdekat yang terlihat (Line of Sight)
  [sNode, eNode].forEach(tmp => {
    let candidates = nodes
      .map(n => ({ id: n.id, d: dist(tmp.coord, n.coord) }))
      .sort((a, b) => a.d - b.d)
      .slice(0, 20); // Ambil 20 kandidat terdekat

    let connected = 0;
    candidates.forEach(c => {
      if (canSee(tmp.coord, nodes[c.id].coord)) {
        edges[tmp.id].push(c.id);
        if (!edges[c.id]) edges[c.id] = [];
        edges[c.id].push(tmp.id);
        connected++;
      }
    });
    console.log(`Node ${tmp.id === sId ? 'Start' : 'End'} terhubung ke ${connected} node grid.`);
  });

  // Jalankan A*
  let path = astar(sNode, eNode);

  if (path.length > 0) {
    routeLine = L.polyline(path, {
      color: '#007bff', 
      weight: 6, 
      opacity: 0.8,
      lineJoin: 'round'
    }).addTo(map);
    map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
  } else {
    if (canSee(start, end)) {
        routeLine = L.polyline([start, end], {color: 'green', weight: 6}).addTo(map);
        alert("Rute Langsung (Tanpa hambatan)");
    } else {
        alert("Rute tetap tidak ditemukan. Pastikan titik tidak terkurung daratan/poligon.");
    }
  }

</script>
</body>
</html>
