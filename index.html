<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal Graph (Like Google Maps)</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
    }

    button {
      margin: 5px;
      padding: 8px;
    }
  </style>
</head>
<body>

<div class="panel">
  <button onclick="setMode('start')">Start</button>
  <button onclick="setMode('end')">End</button>
  <button onclick="runRoute()">Cari Rute</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==========================
// MAP
// ==========================
var map = L.map('map').setView([-7,110],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ==========================
// GLOBAL
// ==========================
let mode = null;
let start = null;
let end = null;
let startMarker, endMarker, routeLine;

// ==========================
// NODE GRAPH (JALUR LAUT)
// 👉 TAMBAH SENDIRI SESUAI DATA PULAU
// ==========================
let nodes = [
  {id:0, coord:[-7.5,110]},
  {id:1, coord:[-7.2,111]},
  {id:2, coord:[-6.8,112]},
  {id:3, coord:[-6.5,113]},
  {id:4, coord:[-7.0,114]},
  {id:5, coord:[-7.8,112]},
];

// koneksi antar node
let edges = {
  0:[1],
  1:[0,2,5],
  2:[1,3],
  3:[2,4],
  4:[3],
  5:[1]
};

// ==========================
function setMode(m){ mode = m; }

map.on('click', function(e){
  let p = [e.latlng.lat, e.latlng.lng];

  if(mode === 'start'){
    start = p;
    if(startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map);
  }

  if(mode === 'end'){
    end = p;
    if(endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map);
  }
});

// ==========================
// UTIL
// ==========================
function dist(a,b){
  return Math.hypot(a[0]-b[0], a[1]-b[1]);
}

// cari node terdekat
function nearestNode(point){
  let best = nodes[0];
  let min = dist(point, best.coord);

  for(let n of nodes){
    let d = dist(point, n.coord);
    if(d < min){
      min = d;
      best = n;
    }
  }

  return best;
}

// ==========================
// A* GRAPH (RINGAN BANGET)
// ==========================
function astar(startNode, endNode){

  let open = [startNode.id];
  let came = {};
  let g = {}, f = {};

  g[startNode.id] = 0;
  f[startNode.id] = dist(startNode.coord, endNode.coord);

  while(open.length){

    let current = open.reduce((a,b)=>f[a]<f[b]?a:b);

    if(current === endNode.id){
      return reconstruct(came, current);
    }

    open = open.filter(n=>n!==current);

    for(let nb of edges[current]){

      let temp = g[current] + dist(
        nodes[current].coord,
        nodes[nb].coord
      );

      if(g[nb] === undefined || temp < g[nb]){
        came[nb] = current;
        g[nb] = temp;
        f[nb] = temp + dist(nodes[nb].coord, endNode.coord);

        if(!open.includes(nb)){
          open.push(nb);
        }
      }
    }
  }

  return [];
}

// ==========================
function reconstruct(came, cur){
  let path = [cur];

  while(came[cur] !== undefined){
    cur = came[cur];
    path.push(cur);
  }

  return path.reverse().map(i=>nodes[i].coord);
}

// ==========================
// SMOOTH
// ==========================
function smooth(path){
  let out=[];

  for(let i=0;i<path.length-1;i++){
    let a=path[i], b=path[i+1];

    for(let t=0;t<=1;t+=0.1){
      out.push([
        a[0]+(b[0]-a[0])*t,
        a[1]+(b[1]-a[1])*t
      ]);
    }
  }

  return out;
}

// ==========================
function runRoute(){

  if(!start || !end){
    alert("Pilih start & end!");
    return;
  }

  let sNode = nearestNode(start);
  let eNode = nearestNode(end);

  let path = astar(sNode, eNode);

  // gabungkan dengan titik asli
  path.unshift(start);
  path.push(end);

  path = smooth(path);

  if(routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(path,{
    color:'blue',
    weight:4
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

// ==========================
function resetAll(){
  if(startMarker) map.removeLayer(startMarker);
  if(endMarker) map.removeLayer(endMarker);
  if(routeLine) map.removeLayer(routeLine);

  start = null;
  end = null;
}
</script>

</body>
</html>
