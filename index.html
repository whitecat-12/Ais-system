<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal (FULL OPTIMIZED)</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: absolute;
      top: 15px;
      left: 50px;
      background: rgba(255, 255, 255, 0.9);
      padding: 15px;
      border-radius: 8px;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      width: 220px;
    }
    button {
      width: 100%;
      margin-bottom: 5px;
      padding: 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
      font-weight: bold;
    }
    button:hover { background: #f0f0f0; }
    .btn-run { background: #28a745 !important; color: white; border: none; }
    .btn-run:hover { background: #218838 !important; }
    .info { margin-top: 10px; font-size: 12px; color: #333; line-height: 1.4; }
    .status-badge { font-weight: bold; color: #d9534f; }
  </style>
</head>
<body>

<div class="panel">
  <strong>Navigasi Kapal</strong>
  <div class="info">
    1. Klik tombol posisi<br>
    2. Klik di peta (Laut)<br>
    3. Cari Rute
  </div>
  <hr>
  <button onclick="setMode('start')">📍 Set Start</button>
  <button onclick="setMode('end')">🏁 Set End</button>
  <button class="btn-run" onclick="runRoute()">🚢 CARI RUTE</button>
  <div class="info">
    Status: <span id="status" class="status-badge">Memuat data...</span>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- KONFIGURASI ENGINE ---
const GRID_STEP = 0.04;    // Kerapatan titik (0.04 ≈ 4.4km). Kecilkan untuk selat sangat sempit.
const K_NEAREST = 12;      // Jumlah koneksi antar titik grid.
const SEARCH_RANGE = 0.8;  // Jangkauan koneksi titik klik ke grid (dalam derajat).

var map = L.map('map').setView([-8.4, 115.1], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let islands = [];
let nodes = [];
let edges = {};
let start = null, end = null;
let startMarker, endMarker, routeLine;
let mode = null;

// --- 1. LOAD DATA PULAU ---
fetch('islands.json')
  .then(res => res.json())
  .then(data => {
    islands = data.islands;
    islands.forEach(isl => {
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length - 1]) {
        isl.polygon.push(isl.polygon[0]);
      }
      L.polygon(isl.polygon, {color: 'red', weight: 1, fillOpacity: 0.15, interactive: false}).addTo(map);
    });

    document.getElementById('status').innerText = "Menghitung Grid...";
    setTimeout(() => {
      generateNodes();
      connectGraph();
      document.getElementById('status').innerText = "Siap!";
      document.getElementById('status').style.color = "#28a745";
    }, 100);
  })
  .catch(err => {
    document.getElementById('status').innerText = "Gagal load islands.json";
    console.error(err);
  });

// --- 2. GEOMETRY & COLLISION ---
function pointInPolygon(p, vs) {
  let x = p[0], y = p[1], inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i][0], yi = vs[i][1];
    let xj = vs[j][0], yj = vs[j][1];
    let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function isBlocked(p) {
  for (let isl of islands) {
    if (pointInPolygon(p, isl.polygon)) return true;
  }
  return false;
}

function canSee(a, b) {
  let d = dist(a, b);
  let steps = Math.max(8, Math.ceil(d / 0.01)); 
  for (let i = 0; i <= steps; i++) {
    let t = i / steps;
    let p = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
    if (isBlocked(p)) return false;
  }
  return true;
}

function dist(a, b) {
  return Math.hypot(a[0] - b[0], a[1] - b[1]);
}

// --- 3. JARINGAN NAVIGASI (GRID) ---
function generateNodes() {
  nodes = [];
  // Mencakup area Bali dan sekitarnya (Jawa Timur - Lombok)
  for (let lat = -9.2; lat < -7.8; lat += GRID_STEP) {
    for (let lng = 114.2; lng < 116.0; lng += GRID_STEP) {
      let p = [lat, lng];
      if (!isBlocked(p)) {
        nodes.push({ id: nodes.length, coord: p });
      }
    }
  }
  console.log("Nodes generated:", nodes.length);
}

function connectGraph() {
  edges = {};
  nodes.forEach(a => {
    edges[a.id] = [];
    let neighbors = nodes
      .filter(b => b.id !== a.id)
      .map(b => ({ id: b.id, d: dist(a.coord, b.coord) }))
      .sort((x, y) => x.d - y.d)
      .slice(0, K_NEAREST);

    neighbors.forEach(n => {
      if (canSee(a.coord, nodes[n.id].coord)) {
        edges[a.id].push(n.id);
      }
    });
  });
  console.log("Graph connected.");
}

// --- 4. PATHFINDING (A*) ---
function astar(startNode, endNode) {
  let open = [startNode.id];
  let cameFrom = {};
  let gScore = {};
  let fScore = {};

  gScore[startNode.id] = 0;
  fScore[startNode.id] = dist(startNode.coord, endNode.coord);

  while (open.length > 0) {
    let currentId = open.reduce((a, b) => fScore[a] < fScore[b] ? a : b);

    if (currentId === endNode.id) {
      return reconstructPath(cameFrom, currentId);
    }

    open = open.filter(id => id !== currentId);

    if (!edges[currentId]) continue;

    for (let neighborId of edges[currentId]) {
      let tentativeG = gScore[currentId] + dist(nodes[currentId].coord, nodes[neighborId].coord);

      if (gScore[neighborId] === undefined || tentativeG < gScore[neighborId]) {
        cameFrom[neighborId] = currentId;
        gScore[neighborId] = tentativeG;
        fScore[neighborId] = tentativeG + dist(nodes[neighborId].coord, endNode.coord);
        if (!open.includes(neighborId)) open.push(neighborId);
      }
    }
  }
  return [];
}

function reconstructPath(cameFrom, current) {
  let path = [current];
  while (cameFrom[current] !== undefined) {
    current = cameFrom[current];
    path.push(current);
  }
  // Mapping ID kembali ke koordinat asli
  return path.reverse().map(id => {
    let found = nodes.find(n => n.id === id);
    return found ? found.coord : null;
  }).filter(c => c !== null);
}

// --- 5. UI & LOGIC ---
function setMode(m) { mode = m; }

map.on('click', e => {
  let p = [e.latlng.lat, e.latlng.lng];
  if (isBlocked(p)) { alert("Jangan klik di daratan!"); return; }

  if (mode === 'start') {
    start = p;
    if (startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map).bindPopup("Titik Awal").openPopup();
  } else if (mode === 'end') {
    end = p;
    if (endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map).bindPopup("Titik Tujuan").openPopup();
  }
});

function runRoute() {
  if (!start || !end) { alert("Tentukan Start dan End dulu!"); return; }
  if (routeLine) map.removeLayer(routeLine);

  document.getElementById('status').innerText = "Mencari rute...";

  // 1. Tambahkan node sementara Start & End
  let sId = nodes.length + 10000;
  let eId = nodes.length + 10001;
  let sNode = { id: sId, coord: start };
  let eNode = { id: eId, coord: end };

  // 2. Hubungkan Start/End ke grid terdekat
  edges[sId] = [];
  edges[eId] = [];

  [sNode, eNode].forEach(tmp => {
    let targets = nodes
      .map(n => ({ id: n.id, d: dist(tmp.coord, n.coord) }))
      .sort((a, b) => a.d - b.d)
      .slice(0, 25); // Cek 25 titik terdekat untuk fleksibilitas

    targets.forEach(t => {
      if (t.d < SEARCH_RANGE && canSee(tmp.coord, nodes[t.id].coord)) {
        edges[tmp.id].push(t.id);
        if (!edges[t.id]) edges[t.id] = [];
        edges[t.id].push(tmp.id);
      }
    });
  });

  // Masukkan sementara ke list nodes untuk referensi A*
  let originalNodes = [...nodes];
  nodes.push(sNode, eNode);

  // 3. Eksekusi Pathfinding
  let path = astar(sNode, eNode);

  if (path.length > 0) {
    routeLine = L.polyline(path, {
      color: '#007bff', 
      weight: 5, 
      opacity: 0.8,
      lineCap: 'round'
    }).addTo(map);
    map.fitBounds(routeLine.getBounds(), {padding: [30, 30]});
    document.getElementById('status').innerText = "Rute Ditemukan!";
  } else {
    document.getElementById('status').innerText = "Gagal!";
    alert("Rute tidak ditemukan. Pastikan area laut tidak terputus grid.");
  }

  // Cleanup: kembalikan nodes ke semula agar tidak menumpuk
  nodes = originalNodes;
}
</script>
</body>
</html>
