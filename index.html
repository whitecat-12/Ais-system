<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal PRO (Smart Gap + Smooth)</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    button {
      margin: 5px;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="panel">
  <button onclick="setMode('start')">Start</button>
  <button onclick="setMode('end')">End</button>
  <button onclick="runRoute()">Cari Rute</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==========================
// MAP
// ==========================
var map = L.map('map').setView([-7,110],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ==========================
let islands = [];
let mode = null;
let start = null;
let end = null;
let startMarker, endMarker, routeLine;

// ==========================
// LOAD ISLAND
// ==========================
fetch('islands.json')
.then(res => res.json())
.then(data => {
  islands = data.islands;

  islands.forEach(island => {
    island.polygon.push(island.polygon[0]);

    L.polygon(island.polygon,{color:'red'}).addTo(map);
  });
});

// ==========================
function setMode(m){ mode = m; }

// ==========================
map.on('click', function(e){
  let p = [e.latlng.lat, e.latlng.lng];

  if(mode === 'start'){
    start = p;
    if(startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map);
  }

  if(mode === 'end'){
    end = p;
    if(endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map);
  }
});

// ==========================
// POINT IN POLYGON
// ==========================
function pointInPolygon(point, vs){
  let x = point[0], y = point[1];
  let inside = false;

  for(let i=0, j=vs.length-1; i<vs.length; j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];

    let intersect = ((yi>y)!=(yj>y)) &&
      (x < (xj-xi)*(y-yi)/(yj-yi)+xi);

    if(intersect) inside = !inside;
  }

  return inside;
}

// ==========================
// TOLERANCE (BIAR BISA DEKAT PULAU)
// ==========================
function isBlocked(point){
  for(let island of islands){
    if(pointInPolygon(point, island.polygon)){
      return true;
    }
  }
  return false;
}

// ==========================
// GRID (LEBIH HALUS)
// ==========================
let step = 0.08;

function toKey(p){
  return p[0].toFixed(3)+","+p[1].toFixed(3);
}

// ==========================
// 16 DIRECTION (LEBIH FLEXIBLE)
// ==========================
function neighbors(p){
  let d = [];

  for(let dx=-1; dx<=1; dx+=0.5){
    for(let dy=-1; dy<=1; dy+=0.5){
      if(dx===0 && dy===0) continue;
      d.push([dx*step, dy*step]);
    }
  }

  return d.map(v=>[p[0]+v[0], p[1]+v[1]]);
}

// ==========================
function dist(a,b){
  return Math.hypot(a[0]-b[0], a[1]-b[1]);
}

// ==========================
// LINE OF SIGHT (ANTI MUTER 🔥)
// ==========================
function canSee(a,b){
  let steps = 20;

  for(let i=0;i<=steps;i++){
    let t = i/steps;
    let lat = a[0] + (b[0]-a[0])*t;
    let lng = a[1] + (b[1]-a[1])*t;

    if(isBlocked([lat,lng])) return false;
  }

  return true;
}

// ==========================
// A*
// ==========================
function astar(start,end){

  let open=[start];
  let cameFrom={};
  let g={}, f={};

  g[toKey(start)] = 0;
  f[toKey(start)] = dist(start,end);

  while(open.length){

    open.sort((a,b)=>f[toKey(a)]-f[toKey(b)]);
    let cur = open.shift();

    if(dist(cur,end) < step){
      return reconstruct(cameFrom,cur);
    }

    for(let n of neighbors(cur)){

      if(isBlocked(n)) continue;

      let key = toKey(n);
      let temp = g[toKey(cur)] + dist(cur,n);

      if(g[key] === undefined || temp < g[key]){
        cameFrom[key] = cur;
        g[key] = temp;
        f[key] = temp + dist(n,end);

        if(!open.find(p => toKey(p) === key)){
          open.push(n);
        }
      }
    }
  }

  return [];
}

// ==========================
// RECONSTRUCT + SHORTCUT 🔥
// ==========================
function reconstruct(cameFrom,cur){
  let path=[cur];

  while(cameFrom[toKey(cur)]){
    cur = cameFrom[toKey(cur)];
    path.push(cur);
  }

  path = path.reverse();

  // shortcut biar nggak muter
  let smooth = [path[0]];

  let i = 0;
  while(i < path.length-1){
    let j = path.length-1;

    for(; j>i; j--){
      if(canSee(path[i], path[j])){
        smooth.push(path[j]);
        i = j;
        break;
      }
    }
  }

  return smooth;
}

// ==========================
// SMOOTH FINAL
// ==========================
function smoothPath(path){
  let result = [];

  for(let i=0; i<path.length-1; i++){
    let p0 = path[i];
    let p1 = path[i+1];

    for(let t=0; t<=1; t+=0.05){
      result.push([
        p0[0] + (p1[0]-p0[0])*t,
        p0[1] + (p1[1]-p0[1])*t
      ]);
    }
  }

  return result;
}

// ==========================
function runRoute(){

  if(!start || !end){
    alert("Pilih start & end dulu!");
    return;
  }

  let raw = astar(start,end);

  if(raw.length === 0){
    alert("Rute gagal!");
    return;
  }

  let path = smoothPath(raw);

  if(routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(path,{
    color:'blue',
    weight:4
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

// ==========================
function resetAll(){
  if(startMarker) map.removeLayer(startMarker);
  if(endMarker) map.removeLayer(endMarker);
  if(routeLine) map.removeLayer(routeLine);

  start = null;
  end = null;
}
</script>

</body>
</html>
