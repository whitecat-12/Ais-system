<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal - Seluruh Indonesia</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: absolute; top: 15px; left: 50px;
      background: white; padding: 15px;
      border-radius: 12px; z-index: 1000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 230px;
    }
    button {
      width: 100%; margin-bottom: 8px; padding: 10px;
      cursor: pointer; border: 1px solid #ddd; background: #f8f9fa;
      border-radius: 6px; font-weight: bold;
    }
    .btn-run { background: #2ecc71; color: white; border: none; }
    .btn-clear { background: #e74c3c; color: white; border: none; }
    .status-box { margin-top: 10px; font-size: 12px; text-align: center; font-weight: bold; }
    #status { color: #e67e22; }
    .info { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>

<div class="panel">
  <strong>🚢 Navigasi Kapal Indonesia</strong><br><br>
  <button onclick="setMode('start')">📍 Tentukan Start</button>
  <button onclick="setMode('end')">🏁 Tentukan End</button>
  <button class="btn-run" onclick="runRoute()">🚀 Cari Rute</button>
  <button class="btn-clear" onclick="clearAll()">🗑️ Reset</button>
  <div class="status-box">Status: <span id="status">Memuat data pulau...</span></div>
  <div class="info">Grid dibangun dinamis hanya di area rute — mendukung seluruh Indonesia.</div>
</div>

<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ============================================================
// KONFIGURASI
// ============================================================
const GRID_STEP    = 0.04;   // Resolusi grid dinamis (°)
const SEARCH_RAD   = 0.12;   // Radius koneksi antar node
const K_NEAREST    = 20;     // Max koneksi per node
const EXPAND_PAD   = 1.5;    // Padding area grid di sekitar rute (°)
const MAX_ITER     = 500000; // Batas iterasi A* agar browser tidak freeze

var map = L.map('map').setView([-2, 118], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let islands = [];
let start = null, end = null, mode = null;
let routeLine, startMarker, endMarker;
let debugLayer = null;

// ============================================================
// LOAD ISLANDS.JSON
// ============================================================
fetch('islands.json')
  .then(r => r.json())
  .then(data => {
    islands = data.islands;
    islands.forEach(isl => {
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length-1])
        isl.polygon.push(isl.polygon[0]);
      L.polygon(isl.polygon, {
        color: '#c0392b', weight: 1, fillOpacity: 0.15, interactive: false
      }).addTo(map);
    });
    updateStatus("Siap — klik Start & End di laut ✅", "#27ae60");
  })
  .catch(() => updateStatus("islands.json gagal dimuat ❌", "red"));

// ============================================================
// GEOMETRY
// ============================================================
function pointInPolygon(p, vs) {
  let x = p[0], y = p[1], inside = false;
  for (let i = 0, j = vs.length-1; i < vs.length; j = i++) {
    let xi=vs[i][0], yi=vs[i][1], xj=vs[j][0], yj=vs[j][1];
    if (((yi>y) !== (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// Bounding-box pre-filter untuk performa
function isBlocked(p) {
  let lat = p[0], lng = p[1];
  for (let isl of islands) {
    // Skip jika di luar bbox pulau
    if (isl.bbox && (lat < isl.bbox.minLat || lat > isl.bbox.maxLat ||
                     lng < isl.bbox.minLng || lng > isl.bbox.maxLng)) continue;
    if (pointInPolygon(p, isl.polygon)) return true;
  }
  return false;
}

// Precompute bounding boxes untuk kecepatan isBlocked
function buildBBox() {
  islands.forEach(isl => {
    let lats = isl.polygon.map(p=>p[0]);
    let lngs = isl.polygon.map(p=>p[1]);
    isl.bbox = {
      minLat: Math.min(...lats), maxLat: Math.max(...lats),
      minLng: Math.min(...lngs), maxLng: Math.max(...lngs)
    };
  });
}

// Interpolasi lebih rapat untuk selat sempit
function canSee(a, b) {
  let d = dist(a, b);
  let steps = Math.max(8, Math.ceil(d / 0.008));
  for (let i = 1; i < steps; i++) {
    let t = i / steps;
    let p = [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
    if (isBlocked(p)) return false;
  }
  return true;
}

function dist(a, b) { return Math.hypot(a[0]-b[0], a[1]-b[1]); }

// ============================================================
// GRID DINAMIS — hanya dibangun di area antara Start & End
// ============================================================
function buildLocalGrid(ptA, ptB) {
  // Bounding box mencakup kedua titik + padding
  let minLat = Math.min(ptA[0], ptB[0]) - EXPAND_PAD;
  let maxLat = Math.max(ptA[0], ptB[0]) + EXPAND_PAD;
  let minLng = Math.min(ptA[1], ptB[1]) - EXPAND_PAD;
  let maxLng = Math.max(ptA[1], ptB[1]) + EXPAND_PAD;

  // Clamp ke batas Indonesia + lautan sekitarnya
  minLat = Math.max(minLat, -12);
  maxLat = Math.min(maxLat,  8);
  minLng = Math.max(minLng,  94);
  maxLng = Math.min(maxLng, 142);

  let nodes = [];
  let nodeMap = {}; // "lat_lng" -> index

  for (let lat = minLat; lat <= maxLat; lat += GRID_STEP) {
    for (let lng = minLng; lng <= maxLng; lng += GRID_STEP) {
      let rlat = +lat.toFixed(5), rlng = +lng.toFixed(5);
      let p = [rlat, rlng];
      if (!isBlocked(p)) {
        let key = `${rlat}_${rlng}`;
        nodeMap[key] = nodes.length;
        nodes.push({ id: nodes.length, coord: p });
      }
    }
  }

  return { nodes, nodeMap, bounds: {minLat, maxLat, minLng, maxLng} };
}

// ============================================================
// BANGUN EDGES untuk grid lokal
// ============================================================
function buildEdges(nodes) {
  let edges = {};
  for (let i = 0; i < nodes.length; i++) {
    edges[i] = [];
    let a = nodes[i];
    let candidates = nodes
      .filter(b => b.id !== i &&
        Math.abs(b.coord[0]-a.coord[0]) < SEARCH_RAD &&
        Math.abs(b.coord[1]-a.coord[1]) < SEARCH_RAD)
      .map(b => ({ id: b.id, d: dist(a.coord, b.coord) }))
      .sort((x,y) => x.d-y.d)
      .slice(0, K_NEAREST);

    for (let c of candidates) {
      if (canSee(a.coord, nodes[c.id].coord)) edges[i].push(c.id);
    }
  }
  return edges;
}

// ============================================================
// SAMBUNGKAN titik klik ke grid lokal
// ============================================================
function attachPoint(coord, nodes, edges, idStr) {
  edges[idStr] = [];
  let sorted = nodes
    .map(n => ({ id: n.id, d: dist(coord, n.coord) }))
    .sort((a,b) => a.d-b.d);

  let connected = 0;

  // Tahap 1: canSee normal
  for (let n of sorted.slice(0, 60)) {
    if (n.d > SEARCH_RAD * 3) break;
    if (canSee(coord, nodes[n.id].coord)) {
      edges[idStr].push(n.id);
      edges[n.id].push(idStr);
      connected++;
    }
  }

  // Tahap 2: perlebar radius
  if (connected === 0) {
    for (let n of sorted.slice(0, 100)) {
      if (n.d > 3.0) break;
      if (canSee(coord, nodes[n.id].coord)) {
        edges[idStr].push(n.id);
        edges[n.id].push(idStr);
        connected++;
      }
    }
  }

  // Tahap 3: fallback paksa
  if (connected === 0) {
    console.warn(`[${idStr}] fallback paksa`);
    sorted.slice(0, 3).forEach(n => {
      edges[idStr].push(n.id);
      edges[n.id].push(idStr);
    });
  }
}

// ============================================================
// A* PATHFINDING
// ============================================================
function astar(sId, eId, nodes, edges, getCoord) {
  let open = new Set([sId]);
  let cameFrom = {};
  let gScore = { [sId]: 0 };
  let fScore = { [sId]: dist(getCoord(sId), getCoord(eId)) };
  let iter = 0;

  while (open.size > 0 && iter++ < MAX_ITER) {
    // Ambil node dengan fScore terkecil
    let curr = [...open].reduce((a,b) =>
      (fScore[a]??Infinity) < (fScore[b]??Infinity) ? a : b
    );

    if (curr === eId) {
      let path = [curr];
      while (cameFrom[curr]) { curr = cameFrom[curr]; path.push(curr); }
      return path.reverse();
    }

    open.delete(curr);
    for (let next of (edges[curr] || [])) {
      let g = (gScore[curr]??Infinity) + dist(getCoord(curr), getCoord(next));
      if (g < (gScore[next]??Infinity)) {
        cameFrom[next] = curr;
        gScore[next] = g;
        fScore[next] = g + dist(getCoord(next), getCoord(eId));
        open.add(next);
      }
    }
  }
  return [];
}

// ============================================================
// MAIN ROUTING
// ============================================================
async function runRoute() {
  if (!start || !end) { alert("Pilih Start dan End terlebih dahulu!"); return; }

  updateStatus("Membangun grid lokal...", "#e67e22");
  await sleep(20);

  // 1. Bangun grid hanya di area relevan
  let { nodes, edges: edgesGrid, bounds } = buildLocalGrid(start, end);

  if (nodes.length === 0) {
    updateStatus("Tidak ada area laut di jalur ini ❌", "red");
    return;
  }

  updateStatus(`Grid: ${nodes.length} node — menghubungkan...`, "#e67e22");
  await sleep(20);

  // 2. Bangun edges
  edgesGrid = buildEdges(nodes);

  // 3. Sambungkan Start & End ke grid
  const sId = "S", eId = "E";
  attachPoint(start, nodes, edgesGrid, sId);
  attachPoint(end,   nodes, edgesGrid, eId);

  updateStatus("Menghitung rute A*...", "#e67e22");
  await sleep(10);

  // 4. A*
  const getCoord = (id) =>
    id === sId ? start : id === eId ? end : nodes[id].coord;

  let path = astar(sId, eId, nodes, edgesGrid, getCoord);

  if (path.length > 0) {
    if (routeLine) map.removeLayer(routeLine);
    let coords = path.map(id => getCoord(id));
    routeLine = L.polyline(coords, { color: '#2980b9', weight: 5, opacity: 0.9 }).addTo(map);
    map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

    // Estimasi jarak
    let totalDeg = 0;
    for (let i = 1; i < coords.length; i++) totalDeg += dist(coords[i-1], coords[i]);
    let km = Math.round(totalDeg * 111);
    updateStatus(`Rute berhasil ✅ (~${km} km)`, "#27ae60");
  } else {
    updateStatus("Gagal: tidak ada jalur laut ❌", "red");
    alert(
      "Rute tidak ditemukan.\n\n" +
      "Kemungkinan penyebab:\n" +
      "• Kedua titik dipisahkan daratan besar\n" +
      "• islands.json memblokir seluruh jalur\n" +
      "• Coba GRID_STEP lebih kecil (0.02) di kode"
    );
  }
}

// ============================================================
// UI HELPERS
// ============================================================
function clearAll() {
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
  if (endMarker) { map.removeLayer(endMarker); endMarker = null; }
  start = null; end = null; mode = null;
  updateStatus("Reset — pilih titik baru", "#888");
}

function setMode(m) { mode = m; updateStatus(`Klik titik ${m === 'start' ? 'Start' : 'End'} di laut...`); }
function updateStatus(txt, col) {
  const s = document.getElementById('status');
  s.innerText = txt;
  s.style.color = col || '#e67e22';
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

map.on('click', e => {
  if (!mode) return;
  let p = [e.latlng.lat, e.latlng.lng];
  if (islands.length > 0 && isBlocked(p)) { alert("Itu daratan!"); return; }

  if (mode === 'start') {
    start = p;
    if (startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p, {
      icon: L.divIcon({ html: '📍', iconSize:[24,24], className:'' })
    }).addTo(map).bindPopup("Start").openPopup();
  } else {
    end = p;
    if (endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p, {
      icon: L.divIcon({ html: '🏁', iconSize:[24,24], className:'' })
    }).addTo(map).bindPopup("End").openPopup();
  }
  mode = null;
  updateStatus("Siap — klik Cari Rute");
});

// Jalankan precompute bbox setelah islands loaded
fetch('islands.json').then(r=>r.json()).then(data => {
  islands = data.islands;
  islands.forEach(isl => {
    if (isl.polygon[0] !== isl.polygon[isl.polygon.length-1]) isl.polygon.push(isl.polygon[0]);
  });
  buildBBox();
});
</script>
</body>
</html>
