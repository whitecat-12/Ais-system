<!DOCTYPE html>
<html>
<head>
  <title>Marine Router Indonesia</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    #map { height: 100vh; width: 100vw; }

    .panel {
      position: absolute; top: 15px; left: 15px;
      background: rgba(255,255,255,0.97);
      padding: 14px 16px;
      border-radius: 18px;
      z-index: 1000;
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      width: 250px;
      font-size: 13px;
    }
    .title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
    .sub   { font-size: 10px; color: #888; margin-bottom: 10px; }

    .btn-row { display: flex; gap: 6px; margin-bottom: 8px; }
    button {
      flex: 1; padding: 8px 6px; cursor: pointer; border: none;
      border-radius: 30px; font-weight: 600; font-size: 11px;
      transition: all 0.18s; white-space: nowrap;
    }
    button:active { transform: scale(0.97); }
    .b-start { background: #3498db; color: #fff; }
    .b-end   { background: #9b59b6; color: #fff; }
    .b-run   { background: #2ecc71; color: #fff; width: 100%; padding: 9px; font-size: 13px; margin-bottom: 8px; }
    .b-clear { background: #f1f2f6; color: #555; width: 100%; font-size: 11px; margin-bottom: 0; }

    .status-wrap { background: #f8f9fa; border-radius: 30px; padding: 6px 10px; margin: 8px 0; font-size: 11px; text-align: center; }
    #status { font-weight: 700; color: #e67e22; }

    #progressBar { width:100%; height:3px; background:#eee; border-radius:3px; margin:6px 0; display:none; }
    #progressFill { height:100%; background:#2ecc71; border-radius:3px; width:0%; transition:width 0.2s; }

    .info { font-size: 10px; color: #666; background: #fef9e6; border-radius: 10px; padding: 6px 9px; line-height: 1.5; }

    .sep { border: none; border-top: 1px solid #eee; margin: 8px 0; }
  </style>
</head>
<body>
<div class="panel">
  <div class="title">🚢 Marine Router</div>
  <div class="sub">Waypoint-First · Ringan · Cepat</div>

  <div class="btn-row">
    <button class="b-start" onclick="setMode('start')">📍 Start</button>
    <button class="b-end"   onclick="setMode('end')">🏁 Tujuan</button>
  </div>
  <button class="b-run"   onclick="runRoute()">⚡ Cari Rute</button>
  <button class="b-clear" onclick="clearAll()">🗑️ Reset</button>

  <div class="status-wrap">📡 <span id="status">Memuat data...</span></div>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div class="info" id="infoBox">Pilih titik Start & Tujuan di laut, lalu cari rute.</div>
</div>

<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════
// KONSTANTA
// ═══════════════════════════════════════════════
const WP_CONNECT_RADIUS = 3.0;   // °  — radius hubungkan WP ke WP terdekat
const WP_K_NEAR         = 8;     // maks tetangga per waypoint
const MAX_ITER          = 200000;

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let islands   = [];
let waypoints = [];   // [{lat, lng, name?}, ...]
let wpGraph   = {};   // id -> [id, ...]  (dibangun sekali setelah load)
let wpReady   = false;

let start = null, end = null, mode = null;
let routeLine, startMarker, endMarker;
let isRouting = false;

// ═══════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════
const map = L.map('map', { zoomControl: true }).setView([-2.5, 118], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM &amp; CartoDB', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ═══════════════════════════════════════════════
// GEOMETRY HELPERS
// ═══════════════════════════════════════════════
function dist(a, b) {
  return Math.hypot(a[0] - b[0], a[1] - b[1]);
}

// Haversine km — untuk tampilan jarak
function distKm(a, b) {
  const R = 6371;
  const dLat = (b[0]-a[0]) * Math.PI/180;
  const dLng = (b[1]-a[1]) * Math.PI/180;
  const s = Math.sin(dLat/2)**2 +
            Math.cos(a[0]*Math.PI/180) * Math.cos(b[0]*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function pointInPolygon(p, vs) {
  let inside = false;
  for (let i = 0, j = vs.length-1; i < vs.length; j = i++) {
    const xi=vs[i][0], yi=vs[i][1], xj=vs[j][0], yj=vs[j][1];
    if (((yi>p[1]) !== (yj>p[1])) && (p[0] < (xj-xi)*(p[1]-yi)/(yj-yi)+xi))
      inside = !inside;
  }
  return inside;
}

// Cek titik di daratan
function isBlocked(lat, lng) {
  for (const isl of islands) {
    if (!isl.bbox) continue;
    if (lat < isl.bbox.minLat || lat > isl.bbox.maxLat) continue;
    if (lng < isl.bbox.minLng || lng > isl.bbox.maxLng) continue;
    if (pointInPolygon([lat, lng], isl.polygon)) return true;
  }
  return false;
}

// LOS — cek apakah garis lurus tidak melalui daratan
// Untuk rute antar waypoint laut, sampling cukup 20 titik
function canSee(a, b, samples = 20) {
  for (let i = 1; i < samples; i++) {
    const t = i / samples;
    const lat = a[0] + (b[0]-a[0])*t;
    const lng = a[1] + (b[1]-a[1])*t;
    if (isBlocked(lat, lng)) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════
let islandsReady = false;

fetch('islands.json')
  .then(r => r.json())
  .then(data => {
    islands = data.islands || [];
    for (const isl of islands) {
      if (!isl.polygon || isl.polygon.length < 3) { isl.skip = true; continue; }
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length-1])
        isl.polygon.push(isl.polygon[0]);
      const lats = isl.polygon.map(p=>p[0]);
      const lngs = isl.polygon.map(p=>p[1]);
      isl.bbox = {
        minLat: Math.min(...lats)-0.02, maxLat: Math.max(...lats)+0.02,
        minLng: Math.min(...lngs)-0.02, maxLng: Math.max(...lngs)+0.02
      };
      L.polygon(isl.polygon, {
        color:'#c0392b', weight:1, fillOpacity:0.15,
        fillColor:'#e74c3c', interactive:false
      }).addTo(map);
    }
    islandsReady = true;
    tryBuildGraph();
    setStatus("✅ Pulau dimuat", "#27ae60");
  })
  .catch(() => {
    islandsReady = true;
    tryBuildGraph();
    setStatus("⚠️ islands.json gagal — tanpa penghalang daratan", "#e67e22");
  });

fetch('waypoint.json')
  .then(r => r.json())
  .then(data => {
    waypoints = (data.waypoints || data || []).filter(w => w.lat && w.lng);
    
    // HAPUS TAMPILAN WAYPOINT: TIDAK MENAMPILKAN MARKER WAYPOINT LAGI
    // Marker waypoint dihapus sesuai permintaan "hapus tampilan waypoint"
    // Kode berikut ini di-comment agar waypoint tidak muncul di peta
    /*
    for (let i = 0; i < waypoints.length; i++) {
      const wp = waypoints[i];
      L.circleMarker([wp.lat, wp.lng], {
        radius: 3.5, color: '#f39c12', weight: 1.5,
        fillColor: '#f9ca24', fillOpacity: 0.9
      }).bindTooltip(wp.name || `WP${i}`, { permanent: false, direction: 'top' }).addTo(map);
    }
    */

    setStatus(`📍 ${waypoints.length} waypoint dimuat (tidak ditampilkan)`, "#2980b9");
    tryBuildGraph();
  })
  .catch(() => {
    setStatus("⚠️ waypoint.json gagal", "#e74c3c");
  });

// ═══════════════════════════════════════════════
// BUILD WAYPOINT GRAPH (sekali saja)
// ═══════════════════════════════════════════════
let graphBuilt = false;

function tryBuildGraph() {
  if (!islandsReady || waypoints.length === 0 || graphBuilt) return;
  graphBuilt = true;
  buildWaypointGraph();
}

function buildWaypointGraph() {
  setStatus("🔗 Membangun graf waypoint...", "#e67e22");
  wpGraph = {};

  for (let i = 0; i < waypoints.length; i++) {
    wpGraph[i] = [];

    // Cari K tetangga terdekat
    const dists = [];
    for (let j = 0; j < waypoints.length; j++) {
      if (i === j) continue;
      const d = dist(
        [waypoints[i].lat, waypoints[i].lng],
        [waypoints[j].lat, waypoints[j].lng]
      );
      if (d <= WP_CONNECT_RADIUS) dists.push({ j, d });
    }
    dists.sort((a,b) => a.d - b.d);

    for (const { j } of dists.slice(0, WP_K_NEAR)) {
      const a = [waypoints[i].lat, waypoints[i].lng];
      const b = [waypoints[j].lat, waypoints[j].lng];
      // Jika islands sudah ada, cek LOS; jika belum, asumsikan bisa
      if (!islands.length || canSee(a, b)) {
        if (!wpGraph[i].includes(j)) wpGraph[i].push(j);
        if (!wpGraph[j]) wpGraph[j] = [];
        if (!wpGraph[j].includes(i)) wpGraph[j].push(i);
      }
    }
  }

  wpReady = true;

  // Debug: gambar edge graph (opsional, bisa di-comment) - TIDAK DIGAMBAR AGAR TIDAK MENGACAUKAN TAMPILAN
  // drawGraph();

  setStatus(`✅ Graf siap · ${waypoints.length} WP (tersembunyi)`, "#27ae60");
  setInfo(`Siap routing. Graf: ${waypoints.length} waypoint internal siap digunakan.`);
}

// (Debug) gambar semua edge - DINONAKTIFKAN AGAR TIDAK MENGACAUKAN
function drawGraph() {
  // Fungsi dikosongkan karena tidak diperlukan tampilan waypoint/edge
  // for (let i = 0; i < waypoints.length; i++) {
  //   for (const j of (wpGraph[i] || [])) {
  //     if (j > i) {
  //       L.polyline(
  //         [[waypoints[i].lat, waypoints[i].lng],[waypoints[j].lat, waypoints[j].lng]],
  //         { color: '#bdc3c7', weight: 0.8, opacity: 0.5 }
  //       ).addTo(map);
  //     }
  //   }
  // }
}

// ═══════════════════════════════════════════════
// SNAP: cari waypoint terdekat dari titik arbitrary
// ═══════════════════════════════════════════════
function findNearestWaypoints(coord, k = 5) {
  return waypoints
    .map((wp, i) => ({ i, d: dist(coord, [wp.lat, wp.lng]) }))
    .sort((a,b) => a.d - b.d)
    .slice(0, k);
}

// ═══════════════════════════════════════════════
// A* PADA WAYPOINT GRAPH
// ═══════════════════════════════════════════════
class MinHeap {
  constructor() { this.h = []; }
  push(item) { this.h.push(item); this._up(this.h.length-1); }
  pop() {
    const top = this.h[0], last = this.h.pop();
    if (this.h.length) { this.h[0] = last; this._down(0); }
    return top;
  }
  _up(i) {
    while (i > 0) {
      const p = (i-1)>>1;
      if (this.h[p][0] <= this.h[i][0]) break;
      [this.h[p],this.h[i]] = [this.h[i],this.h[p]]; i = p;
    }
  }
  _down(i) {
    const n = this.h.length;
    while (true) {
      let s = i, l = 2*i+1, r = 2*i+2;
      if (l < n && this.h[l][0] < this.h[s][0]) s = l;
      if (r < n && this.h[r][0] < this.h[s][0]) s = r;
      if (s === i) break;
      [this.h[i],this.h[s]] = [this.h[s],this.h[i]]; i = s;
    }
  }
  get size() { return this.h.length; }
}

// id: angka = waypoint index; 'S' = start virtual; 'E' = end virtual
// extraEdges: { 'S': [wpIdx,...], 'E': [wpIdx,...], wpIdx: ['S'|'E',...] }
function astar(srcId, dstId, extraEdges, coordOf) {
  const heap = new MinHeap();
  heap.push([0, srcId]);
  const g   = new Map([[srcId, 0]]);
  const came = new Map();
  const vis  = new Set();
  let iter = 0;

  while (heap.size && iter++ < MAX_ITER) {
    const [, cur] = heap.pop();
    if (vis.has(cur)) continue;
    vis.add(cur);
    if (cur === dstId) {
      const path = []; let c = cur;
      while (came.has(c)) { path.push(c); c = came.get(c); }
      path.push(srcId);
      return path.reverse();
    }

    // tetangga dari wpGraph + extraEdges
    const neighbors = [
      ...(typeof cur === 'number' ? (wpGraph[cur] || []) : []),
      ...(extraEdges[cur] || [])
    ];

    for (const nb of neighbors) {
      if (vis.has(nb)) continue;
      const ng = (g.get(cur) || 0) + dist(coordOf(cur), coordOf(nb));
      if (ng < (g.get(nb) ?? Infinity)) {
        g.set(nb, ng);
        came.set(nb, cur);
        const h = dist(coordOf(nb), coordOf(dstId));
        heap.push([ng + h, nb]);
      }
    }
  }
  return null; // tidak ada jalur
}

// ═══════════════════════════════════════════════
// MAIN ROUTE
// ═══════════════════════════════════════════════
async function runRoute() {
  if (!start || !end) { alert("Pilih Start dan Tujuan dulu!"); return; }
  if (isRouting) return;
  if (!wpReady)  { alert("Data belum selesai dimuat, tunggu sebentar..."); return; }
  isRouting = true;

  showProgress(0.1);
  setStatus("🔍 Mencari waypoint terdekat...", "#f39c12");
  await tick();

  // Snap start & end ke beberapa WP terdekat yang bisa dilihat
  const startCoord = start;
  const endCoord   = end;

  // Cari kandidat WP dari start
  const startCands = findNearestWaypoints(startCoord, 12);
  const endCands   = findNearestWaypoints(endCoord,   12);

  // Filter yang LOS-clear (atau ambil 3 terdekat jika semua blocked)
  const startWPs = pickReachable(startCoord, startCands);
  const endWPs   = pickReachable(endCoord,   endCands);

  if (!startWPs.length || !endWPs.length) {
    setStatus("❌ Tidak bisa menjangkau waypoint terdekat", "red");
    setInfo("Coba klik titik yang lebih dekat ke jalur pelayaran.");
    isRouting = false; hideProgress(); return;
  }

  showProgress(0.3);
  setStatus("🚀 Menghitung rute...", "#2ecc71");
  await tick();

  // Virtual node 'S' dan 'E'
  const extraEdges = { 'S': [], 'E': [] };
  for (const { i } of startWPs) {
    extraEdges['S'].push(i);
    if (!extraEdges[i]) extraEdges[i] = [];
    extraEdges[i].push('S');
  }
  for (const { i } of endWPs) {
    extraEdges['E'].push(i);
    if (!extraEdges[i]) extraEdges[i] = [];
    extraEdges[i].push('E');
  }

  // Kalau start dan end sangat dekat satu WP yang sama, langsung hubungkan
  const sharedWP = startWPs.find(s => endWPs.some(e => e.i === s.i));
  if (sharedWP) {
    extraEdges['S'].push('E');
    extraEdges['E'].push('S');
  }

  const coordOf = id => {
    if (id === 'S') return startCoord;
    if (id === 'E') return endCoord;
    return [waypoints[id].lat, waypoints[id].lng];
  };

  const pathIds = astar('S', 'E', extraEdges, coordOf);
  showProgress(0.9);

  if (!pathIds || pathIds.length < 2) {
    // Coba langsung hubungkan S→E jika bisa lihat satu sama lain
    if (canSee(startCoord, endCoord, 40)) {
      drawRoute([startCoord, endCoord]);
      const km  = distKm(startCoord, endCoord).toFixed(1);
      const nm  = (distKm(startCoord, endCoord) / 1.852).toFixed(0);
      setStatus(`✅ Jalur langsung: ${km} km (${nm} nm)`, "#27ae60");
      setInfo("Rute langsung (tidak ada waypoint di antaranya).");
    } else {
      setStatus("❌ Rute tidak ditemukan", "red");
      setInfo("Coba pilih titik yang lebih dekat ke jalur pelayaran utama.");
      alert("Jalur tidak ditemukan.\nPastikan titik Start & Tujuan berada di laut dekat jalur pelayaran.");
    }
    showProgress(1); setTimeout(hideProgress, 600);
    isRouting = false; return;
  }

  // Susun koordinat rute
  const coords = pathIds.map(id => coordOf(id));
  drawRoute(coords);

  // Hitung total jarak
  let totalKm = 0;
  for (let i = 1; i < coords.length; i++) totalKm += distKm(coords[i-1], coords[i]);
  const nm = (totalKm / 1.852).toFixed(0);
  const wpCount = pathIds.filter(id => id !== 'S' && id !== 'E').length;

  setStatus(`✅ ${totalKm.toFixed(1)} km · ${nm} nm`, "#27ae60");
  setInfo(`🎯 Rute via ${wpCount} waypoint (tidak ditampilkan) · ${coords.length} titik jalur`);

  showProgress(1); setTimeout(hideProgress, 600);
  isRouting = false;
}

// Pilih WP yang bisa dilihat dari titik coord, atau fallback 3 terdekat
function pickReachable(coord, candidates) {
  const reachable = candidates.filter(({ i }) =>
    canSee(coord, [waypoints[i].lat, waypoints[i].lng], 25)
  );
  if (reachable.length >= 1) return reachable.slice(0, 4);
  // fallback: ambil 3 terdekat tanpa cek LOS
  return candidates.slice(0, 3);
}

function drawRoute(coords) {
  if (routeLine) map.removeLayer(routeLine);
  routeLine = L.polyline(coords, {
    color: '#2980b9', weight: 5, opacity: 0.92,
    lineJoin: 'round', lineCap: 'round'
  }).addTo(map);
  map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════
const tick = () => new Promise(r => setTimeout(r, 0));

function setMode(m) {
  if (isRouting) return;
  mode = m;
  setStatus(`📍 Klik titik ${m === 'start' ? 'START' : 'TUJUAN'} di laut`, "#3498db");
}

function clearAll() {
  if (isRouting) return;
  [routeLine, startMarker, endMarker].forEach(l => { if (l) map.removeLayer(l); });
  routeLine = startMarker = endMarker = null;
  start = end = mode = null;
  setStatus("Reset. Pilih titik baru.", "#7f8c8d");
  setInfo("Pilih titik Start & Tujuan di laut, lalu cari rute.");
}

function setStatus(txt, col = "#e67e22") {
  const el = document.getElementById('status');
  el.innerText = txt; el.style.color = col;
}
function setInfo(txt) { document.getElementById('infoBox').innerHTML = txt; }
function showProgress(p) {
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('progressFill').style.width = Math.round(p*100) + '%';
}
function hideProgress() { document.getElementById('progressBar').style.display = 'none'; }

map.on('click', e => {
  if (!mode || isRouting) return;
  const lat = e.latlng.lat, lng = e.latlng.lng;

  if (islands.length && isBlocked(lat, lng)) {
    alert("⚠️ Titik di daratan! Pilih di laut."); return;
  }

  const icon = (emoji) => L.divIcon({
    html: `<span style="font-size:24px;line-height:1">${emoji}</span>`,
    iconSize: [28, 28], className: '', iconAnchor: [14, 14]
  });

  if (mode === 'start') {
    start = [lat, lng];
    if (startMarker) map.removeLayer(startMarker);
    startMarker = L.marker([lat,lng], { icon: icon('🚢') })
      .addTo(map).bindPopup("Start");
  } else {
    end = [lat, lng];
    if (endMarker) map.removeLayer(endMarker);
    endMarker = L.marker([lat,lng], { icon: icon('🏁') })
      .addTo(map).bindPopup("Tujuan");
  }
  mode = null;
  setStatus("✅ Tersimpan. Tekan 'Cari Rute'.", "#27ae60");
});

window.addEventListener('load', () => {
  setStatus("Memuat islands.json & waypoint.json...");
});
</script>
</body>
</html>
