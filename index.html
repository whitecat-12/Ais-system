<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal (Final Pro Version)</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: absolute; top: 15px; left: 50px;
      background: white; padding: 15px;
      border-radius: 12px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 220px;
    }
    button { 
      width: 100%; margin-bottom: 8px; padding: 10px; 
      cursor: pointer; border: 1px solid #ddd; background: #f8f9fa; 
      border-radius: 6px; font-weight: bold;
    }
    .btn-run { background: #2ecc71; color: white; border: none; }
    .status-box { margin-top: 10px; font-size: 12px; text-align: center; font-weight: bold; }
    #status { color: #e67e22; }
  </style>
</head>
<body>

<div class="panel">
  <strong>Navigasi Kapal</strong><br><br>
  <button onclick="setMode('start')">📍 Tentukan Start</button>
  <button onclick="setMode('end')">🏁 Tentukan End</button>
  <button class="btn-run" onclick="runRoute()">🚀 Cari Rute Sekarang</button>
  <div class="status-box">Status: <span id="status">Memuat Pulau...</span></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const GRID_STEP = 0.02;
const K_NEAREST = 25;
const SEARCH_RADIUS = 0.06;
// ✅ PERBAIKAN 1: Buffer margin dari daratan
const LAND_BUFFER = 0.012;

var map = L.map('map').setView([-8.4, 115.1], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let islands = [], nodes = [], edges = {};
let start = null, end = null, mode = null;
let routeLine, startMarker, endMarker;

fetch('islands.json')
  .then(res => res.json())
  .then(async data => {
    islands = data.islands;
    islands.forEach(isl => {
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length - 1]) isl.polygon.push(isl.polygon[0]);
      L.polygon(isl.polygon, {color: 'red', weight: 1, fillOpacity: 0.1, interactive: false}).addTo(map);
    });
    updateStatus("Membangun Jalur Laut...");
    await sleep(50);
    generateNodes();
    await connectGraphAsync();
    updateStatus("Sistem Siap ✅", "#27ae60");
  });

function pointInPolygon(p, vs) {
  let x = p[0], y = p[1], inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i][0], yi = vs[i][1], xj = vs[j][0], yj = vs[j][1];
    if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

// ✅ PERBAIKAN 1: isBlocked dengan buffer margin dari tepi daratan
function isBlocked(p, buffer = 0) {
  for (let i = 0; i < islands.length; i++) {
    if (pointInPolygon(p, islands[i].polygon)) return true;
    if (buffer > 0) {
      // Cek titik-titik di sekitar dengan buffer
      const offsets = [[buffer,0],[-buffer,0],[0,buffer],[0,-buffer]];
      for (let [dlat, dlng] of offsets) {
        if (pointInPolygon([p[0]+dlat, p[1]+dlng], islands[i].polygon)) return true;
      }
    }
  }
  return false;
}

function canSee(a, b) {
  let d = dist(a, b);
  let steps = Math.max(8, Math.ceil(d / 0.008));
  for (let i = 1; i < steps; i++) {
    let t = i / steps;
    let p = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
    if (isBlocked(p)) return false;
  }
  return true;
}

function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }

function generateNodes() {
  for (let lat = -9.2; lat < -7.6; lat += GRID_STEP) {
    for (let lng = 113.8; lng < 116.2; lng += GRID_STEP) {
      let p = [lat, lng];
      // ✅ PERBAIKAN 1: Buang node yang terlalu dekat daratan
      if (!isBlocked(p, LAND_BUFFER)) nodes.push({ id: nodes.length, coord: p });
    }
  }
}

async function connectGraphAsync() {
  for (let i = 0; i < nodes.length; i++) {
    let a = nodes[i];
    edges[a.id] = [];
    let candidates = nodes.filter(b => a.id !== b.id && 
        Math.abs(a.coord[0] - b.coord[0]) < SEARCH_RADIUS && 
        Math.abs(a.coord[1] - b.coord[1]) < SEARCH_RADIUS);

    candidates.map(b => ({ id: b.id, d: dist(a.coord, b.coord) }))
      .sort((x, y) => x.d - y.d)
      .slice(0, K_NEAREST)
      .forEach(n => {
        if (canSee(a.coord, nodes[n.id].coord)) edges[a.id].push(n.id);
      });

    if (i % 400 === 0) {
      updateStatus(`Koneksi: ${Math.round((i/nodes.length)*100)}%`);
      await sleep(1);
    }
  }
}

function runRoute() {
  if (!start || !end) { alert("Pilih Start dan End!"); return; }
  updateStatus("Menghitung...");

  const sId = "START_NODE", eId = "END_NODE";
  edges[sId] = [];
  edges[eId] = [];

  // ✅ PERBAIKAN 2 & 3: Radius lebih besar + fallback paksa
  const connectPoint = (id, coord) => {
    let sorted = nodes
      .map(n => ({ id: n.id, d: dist(coord, n.coord) }))
      .sort((a, b) => a.d - b.d);

    // Coba normal dulu: radius 0.6, 60 kandidat
    let connected = 0;
    sorted
      .filter(n => n.d < 0.6)
      .slice(0, 60)
      .forEach(n => {
        if (canSee(coord, nodes[n.id].coord)) {
          edges[id].push(n.id);
          edges[n.id].push(id);
          connected++;
        }
      });

    // ✅ PERBAIKAN 2: Fallback — paksa sambung 3 node terdekat walau mungkin terhalang
    if (connected === 0) {
      console.warn(`[${id}] canSee() gagal total, fallback paksa ke 3 node terdekat`);
      sorted.slice(0, 3).forEach(n => {
        edges[id].push(n.id);
        edges[n.id].push(id);
      });
    }
  };

  connectPoint(sId, start);
  connectPoint(eId, end);

  let path = astar(sId, eId);

  // Bersihkan koneksi sementara
  edges[sId] && edges[sId].forEach(nId => { if(edges[nId]) edges[nId] = edges[nId].filter(id => id !== sId); });
  edges[eId] && edges[eId].forEach(nId => { if(edges[nId]) edges[nId] = edges[nId].filter(id => id !== eId); });
  delete edges[sId];
  delete edges[eId];

  if (path.length > 0) {
    if (routeLine) map.removeLayer(routeLine);
    let coords = path.map(id => (id === sId) ? start : (id === eId ? end : nodes[id].coord));
    routeLine = L.polyline(coords, {color: '#007bff', weight: 6}).addTo(map);
    map.fitBounds(routeLine.getBounds());
    updateStatus("Rute Berhasil! ✅", "#27ae60");
  } else {
    updateStatus("Gagal: area terisolasi ❌", "red");
    alert("Rute tidak ditemukan. Kemungkinan:\n• Area benar-benar terkepung daratan\n• Coba titik lebih ke tengah laut\n• Periksa islands.json apakah poligon menutup area laut");
  }
}

function astar(s, e) {
  let getC = (id) => (id === "START_NODE") ? start : (id === "END_NODE" ? end : nodes[id].coord);
  let open = [s], cameFrom = {}, gScore = {[s]: 0}, fScore = {[s]: dist(getC(s), getC(e))};

  while (open.length > 0) {
    let curr = open.reduce((a, b) => (fScore[a] ?? Infinity) < (fScore[b] ?? Infinity) ? a : b);
    if (curr === e) {
      let res = [curr];
      while (cameFrom[curr] !== undefined) { curr = cameFrom[curr]; res.push(curr); }
      return res.reverse();
    }
    open = open.filter(i => i !== curr);
    (edges[curr] || []).forEach(next => {
      let g = gScore[curr] + dist(getC(curr), getC(next));
      if (gScore[next] === undefined || g < gScore[next]) {
        cameFrom[next] = curr;
        gScore[next] = g;
        fScore[next] = g + dist(getC(next), getC(e));
        if (!open.includes(next)) open.push(next);
      }
    });
  }
  return [];
}

// ✅ PERBAIKAN 4: Validasi titik saat klik — peringatan jika terlalu jauh dari grid
function setMode(m) { mode = m; updateStatus("Pilih titik di laut..."); }
function updateStatus(txt, col) { const s = document.getElementById('status'); s.innerText = txt; s.style.color = col || '#e67e22'; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

map.on('click', e => {
  let p = [e.latlng.lat, e.latlng.lng];
  if (isBlocked(p)) { alert("Itu daratan!"); return; }

  // ✅ PERBAIKAN 4: Cek apakah ada node grid cukup dekat
  if (mode === 'start' || mode === 'end') {
    let nearest = nodes.reduce((best, n) => {
      let d = dist(p, n.coord);
      return d < best.d ? {d, n} : best;
    }, {d: Infinity, n: null});

    if (nearest.d > 0.6) {
      alert(`Titik ini terlalu terpencil (jarak ke grid: ${nearest.d.toFixed(3)}°).\nCoba klik di area laut yang lebih terbuka.`);
      return;
    }

    if (mode === 'start') {
      start = p;
      if (startMarker) map.removeLayer(startMarker);
      startMarker = L.marker(p).addTo(map);
    } else {
      end = p;
      if (endMarker) map.removeLayer(endMarker);
      endMarker = L.marker(p).addTo(map);
    }
    mode = null;
    updateStatus("Siap");
  }
});
</script>
</body>
</html>
