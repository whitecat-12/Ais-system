<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal - Seluruh Indonesia</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
    #map { height: 100vh; width: 100vw; background: #c8e0f0; }
    .panel {
      position: absolute; top: 15px; left: 15px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      border-radius: 20px;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 300px;
      border: 1px solid rgba(0,0,0,0.08);
      font-size: 13px;
    }
    button {
      width: 100%; margin-bottom: 8px; padding: 8px 10px;
      cursor: pointer; border: none; background: #f8f9fa;
      border-radius: 40px; font-weight: 600; font-size: 12px;
      transition: all 0.2s ease;
    }
    button:hover { transform: translateY(-1px); filter: brightness(0.96); }
    .btn-run   { background: #2ecc71; color: white; }
    .btn-clear { background: #e74c3c; color: white; }
    .btn-primary { background: #3498db; color: white; }
    .status-box { margin-top: 10px; font-size: 11px; text-align: center; background: #f8f9fa; border-radius: 40px; padding: 6px; }
    #status { color: #e67e22; font-weight: bold; }
    .info { font-size: 10px; color: #555; margin-top: 8px; background: #fef9e6; padding: 6px 8px; border-radius: 12px; }
    #progressBar { width:100%; height:4px; background:#e2e8f0; border-radius:4px; margin-top:10px; display:none; }
    #progressFill { height:100%; background:#2ecc71; border-radius:4px; width:0%; }
    .cfg { font-size: 10px; margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 8px; }
    .cfg label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .cfg input { width: 110px; }
    .waypoint-list { max-height: 150px; overflow-y: auto; font-size: 9px; margin-top: 8px; border-top: 1px solid #eee; padding-top: 6px; }
    .waypoint-item { padding: 3px 0; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>

<div class="panel">
  <strong style="font-size:14px">🚢 Marine Router Indonesia</strong>
  <div style="font-size:9px; color:#7f8c8d; margin-bottom:8px">✅ Waypoint Auto-Detection</div>
  
  <button class="btn-primary" onclick="setMode('start')">📍 Titik Start</button>
  <button class="btn-primary" onclick="setMode('end')">🏁 Titik Tujuan</button>
  <button class="btn-run" onclick="runRoute()">⚡ Cari Rute Cepat</button>
  <button class="btn-clear" onclick="clearAll()">🗑️ Reset Semua</button>
  
  <div class="status-box">📡 Status: <span id="status">Memuat data...</span></div>
  <div id="progressBar"><div id="progressFill"></div></div>

  <div class="cfg">
    <label>🌊 Resolusi Grid 
      <input type="range" id="sliderStep" min="1" max="8" value="2" step="1"
             oninput="updateStepDisplay()">
      <span id="valStep">0.015°</span>
    </label>
    <label>🔄 Ketelitian Selat
      <input type="range" id="sliderFine" min="0" max="3" value="3" step="1"
             oninput="document.getElementById('valFine').innerText=fineVal()+'×'">
      <span id="valFine">3×</span>
    </label>
  </div>

  <div class="info" id="infoBox">✨ Waypoint akan dideteksi & diprioritaskan</div>
  <div class="waypoint-list" id="wpList"></div>
</div>

<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ============================================================
// KONFIGURASI
// ============================================================
function stepVal() {
  const vals = [0.008, 0.015, 0.025, 0.035, 0.045, 0.055, 0.065, 0.08];
  return vals[+document.getElementById('sliderStep').value-1] || 0.015;
}

function updateStepDisplay() {
  document.getElementById('valStep').innerText = stepVal()+'°';
}

function fineVal() { return +document.getElementById('sliderFine').value; }

const EXPAND_PAD = 3.0;
const K_NEAREST  = 20;
const CHUNK_SIZE = 400;
const MAX_ITER   = 800000;

// ============================================================
// GLOBAL STATE
// ============================================================
let islands = [];
let waypoints = [];
let start = null, end = null, mode = null;
let routeLine, startMarker, endMarker;
let isRouting = false;
let map;
let waypointMarkers = [];

// ============================================================
// INIT MAP
// ============================================================
map = L.map('map').setView([-7.5, 113], 7.5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd',
  maxZoom: 18,
}).addTo(map);

// ============================================================
// LOAD ISLANDS.JSON
// ============================================================
fetch('islands.json')
  .then(r => r.json())
  .then(data => {
    islands = data.islands || [];
    islands.forEach(isl => {
      if (!isl.polygon || isl.polygon.length < 3) return;
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length-1])
        isl.polygon.push(isl.polygon[0]);
      const lats = isl.polygon.map(p=>p[0]);
      const lngs = isl.polygon.map(p=>p[1]);
      isl.bbox = {
        minLat: Math.min(...lats)-0.02, maxLat: Math.max(...lats)+0.02,
        minLng: Math.min(...lngs)-0.02, maxLng: Math.max(...lngs)+0.02
      };
      L.polygon(isl.polygon, {color:'#d35400', weight:1, fillOpacity:0.15, fillColor:'#e67e22'}).addTo(map);
    });
    updateStatus("✅ Pulau dimuat", "#27ae60");
  })
  .catch(()=> updateStatus("⚠️ islands.json gagal", "#e67e22"));

// ============================================================
// LOAD WAYPOINT.JSON - DENGAN DEBUG VISUAL
// ============================================================
fetch('waypoint.json')
  .then(r => r.json())
  .then(data => {
    waypoints = data.waypoints || data || [];
    if(Array.isArray(waypoints) && waypoints.length){
      // Clear existing markers
      waypointMarkers.forEach(m => map.removeLayer(m));
      waypointMarkers = [];
      
      // Update UI list
      const wpListDiv = document.getElementById('wpList');
      wpListDiv.innerHTML = '<strong>📌 Waypoint Aktif:</strong><br>';
      
      waypoints.forEach((wp, idx) => {
        if(wp.lat && wp.lng){
          // Visualisasi waypoint - BESAR dan JELAS
          const marker = L.circleMarker([wp.lat, wp.lng], { 
            radius: 9, 
            color: '#e67e22', 
            weight: 3, 
            fillOpacity: 0.95, 
            fillColor: '#f39c12'
          }).bindPopup(`
            <b>🚩 ${wp.name || 'Waypoint '+(idx+1)}</b><br>
            📍 ${wp.lat.toFixed(4)}, ${wp.lng.toFixed(4)}<br>
            ${wp.description || ''}
          `).addTo(map);
          waypointMarkers.push(marker);
          
          // Add to list
          wpListDiv.innerHTML += `<div class="waypoint-item">📍 ${wp.name || 'WP'+(idx+1)}: ${wp.lat}, ${wp.lng}</div>`;
        }
      });
      
      updateStatus(`📍 ${waypoints.length} waypoint dimuat!`, "#f39c12");
      console.log("✅ WAYPOINT LOADED:", waypoints.length, waypoints);
    } else {
      document.getElementById('wpList').innerHTML = '<strong>⚠️ Tidak ada waypoint</strong>';
    }
  })
  .catch((e) => { 
    console.log("waypoint.json error:", e);
    document.getElementById('wpList').innerHTML = '<strong>❌ waypoint.json tidak ditemukan</strong>';
  });

// ============================================================
// GEOMETRY FUNCTIONS
// ============================================================
function pointInPolygon(p, vs) {
  let x=p[0], y=p[1], inside=false;
  for (let i=0,j=vs.length-1; i<vs.length; j=i++) {
    let xi=vs[i][0], yi=vs[i][1], xj=vs[j][0], yj=vs[j][1];
    if(((yi>y) != (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

function isBlocked(p) {
  const lat=p[0], lng=p[1];
  for (const isl of islands) {
    if(!isl.bbox) continue;
    if(lat<isl.bbox.minLat || lat>isl.bbox.maxLat || lng<isl.bbox.minLng || lng>isl.bbox.maxLng) continue;
    if(pointInPolygon(p, isl.polygon)) return true;
  }
  return false;
}

function dist(a,b){ return Math.hypot(a[0]-b[0], a[1]-b[1]); }

function canSee(a, b) {
  const d = dist(a,b);
  const steps = Math.min(60, Math.max(12, Math.ceil(d / 0.008)));
  for(let i=1; i<steps; i++){
    const t = i/steps;
    const lat = a[0] + (b[0]-a[0])*t;
    const lng = a[1] + (b[1]-a[1])*t;
    if(isBlocked([lat, lng])) return false;
  }
  return true;
}

// ============================================================
// SPATIAL INDEX
// ============================================================
function buildSpatialIndex(nodes, cellSize){
  const idx = {};
  for(const n of nodes){
    const k = `${Math.floor(n.coord[0]/cellSize)},${Math.floor(n.coord[1]/cellSize)}`;
    if(!idx[k]) idx[k] = [];
    idx[k].push(n);
  }
  return idx;
}

function getNearbyNodes(coord, idx, cellSize, radius){
  const r = Math.ceil(radius/cellSize);
  const cx = Math.floor(coord[0]/cellSize), cy = Math.floor(coord[1]/cellSize);
  const out = [];
  for(let dx=-r; dx<=r; dx++){
    for(let dy=-r; dy<=r; dy++){
      const k = `${cx+dx},${cy+dy}`;
      if(idx[k]) out.push(...idx[k]);
    }
  }
  return out;
}

// ============================================================
// GRID ADAPTIVE - FIX: PASTIKAN WAYPOINT MASUK!
// ============================================================
function buildAdaptiveGridWithWaypoints(ptA, ptB) {
  const GRID = stepVal();
  const FINE = fineVal();
  const FSTEP = FINE>0 ? GRID/(FINE+1) : GRID;
  
  // Bounding box - DIPERBESAR untuk mencakup waypoint
  let minLat = Math.min(ptA[0], ptB[0]) - EXPAND_PAD;
  let maxLat = Math.max(ptA[0], ptB[0]) + EXPAND_PAD;
  let minLng = Math.min(ptA[1], ptB[1]) - EXPAND_PAD;
  let maxLng = Math.max(ptA[1], ptB[1]) + EXPAND_PAD;
  
  // Batas Indonesia
  minLat = Math.max(minLat, -12); maxLat = Math.min(maxLat, 8);
  minLng = Math.max(minLng, 94);  maxLng = Math.min(maxLng, 142);
  
  console.log(`Bounding box: lat ${minLat} to ${maxLat}, lng ${minLng} to ${maxLng}`);
  
  const added = new Set();
  const nodes = [];
  
  const addNode = (lat, lng, isWp = false, wpData = null) => {
    const rlat = +lat.toFixed(5), rlng = +lng.toFixed(5);
    const key = `${rlat}_${rlng}`;
    if(added.has(key)) return;
    added.add(key);
    const p = [rlat, rlng];
    // JANGAN filter isBlocked untuk waypoint! Waypoint bisa di daratan (pelabuhan)
    if(!isBlocked(p) || isWp) {
      nodes.push({ 
        id: nodes.length, 
        coord: p, 
        isWaypoint: isWp,
        waypointData: wpData
      });
      if(isWp) console.log(`✅ WAYPOINT NODE: ${wpData?.name} at ${rlat}, ${rlng}`);
    } else {
      if(isWp) console.log(`⚠️ Waypoint ${wpData?.name} terblokir daratan, tetap ditambahkan`);
      // TETAP tambahkan waypoint meskipun terblokir (untuk pelabuhan)
      nodes.push({ 
        id: nodes.length, 
        coord: p, 
        isWaypoint: true,
        waypointData: wpData
      });
    }
  };

  // 1. SEMUA waypoint - PRIORITAS UTAMA
  if(waypoints && waypoints.length){
    console.log(`Menambahkan ${waypoints.length} waypoint ke nodes...`);
    for(const wp of waypoints){
      if(wp.lat && wp.lng){
        addNode(wp.lat, wp.lng, true, wp);
      }
    }
  }

  // 2. Grid kasar
  for(let lat=minLat; lat<=maxLat+1e-8; lat+=GRID)
    for(let lng=minLng; lng<=maxLng+1e-8; lng+=GRID)
      addNode(lat, lng, false);

  // 3. Grid halus di sekitar start & end
  if(FINE > 0){
    for(const pt of [ptA, ptB]){
      for(let lat=pt[0]-1.2; lat<=pt[0]+1.2+1e-8; lat+=FSTEP)
        for(let lng=pt[1]-1.2; lng<=pt[1]+1.2+1e-8; lng+=FSTEP)
          addNode(lat, lng, false);
    }
  }

  const wpNodes = nodes.filter(n=>n.isWaypoint);
  console.log(`Total nodes: ${nodes.length}, Waypoint nodes: ${wpNodes.length}`);
  if(wpNodes.length === 0 && waypoints.length > 0){
    console.error("⚠️ KRITIS: Waypoint tidak masuk ke nodes!");
  }
  
  return nodes;
}

// ============================================================
// BUILD EDGES - PRIORITAS WAYPOINT
// ============================================================
async function buildEdgesSmart(nodes, SRAD, onProgress) {
  const edges = {};
  const idx = buildSpatialIndex(nodes, SRAD);
  
  for(let i=0; i<nodes.length; i++){
    edges[i] = [];
    const a = nodes[i];
    const radius = a.isWaypoint ? SRAD * 2.5 : SRAD;
    const nearby = getNearbyNodes(a.coord, idx, SRAD, radius);
    
    const candidates = nearby
      .filter(b => b.id !== i)
      .map(b => ({ 
        id: b.id, 
        d: dist(a.coord, b.coord),
        isWpTarget: b.isWaypoint
      }))
      .sort((x,y) => {
        // WAYPOINT PRIORITAS ABSOLUT
        if(x.isWpTarget && !y.isWpTarget) return -1;
        if(!x.isWpTarget && y.isWpTarget) return 1;
        return x.d - y.d;
      })
      .slice(0, K_NEAREST);
    
    let connectedCount = 0;
    for(const cand of candidates){
      if(canSee(a.coord, nodes[cand.id].coord)){
        edges[i].push(cand.id);
        connectedCount++;
      }
    }
    
    if(i % CHUNK_SIZE === 0){
      onProgress(i / nodes.length);
      await new Promise(r => setTimeout(r, 0));
    }
  }
  return edges;
}

// ============================================================
// ATTACH POINT - WAJIB HUBUNGKAN KE WAYPOINT
// ============================================================
function attachPointToGraph(coord, nodes, edges, idx, SRAD, nodeId) {
  edges[nodeId] = [];
  
  // Cari semua node
  const allCandidates = getNearbyNodes(coord, idx, SRAD, SRAD * 8);
  
  // Pisahkan waypoint dan non-waypoint
  const waypointCandidates = allCandidates.filter(n => n.isWaypoint).map(n => ({
    id: n.id, d: dist(coord, n.coord), isWp: true, wpName: n.waypointData?.name
  }));
  const regularCandidates = allCandidates.filter(n => !n.isWaypoint).map(n => ({
    id: n.id, d: dist(coord, n.coord), isWp: false
  }));
  
  // Urutkan waypoint berdasarkan jarak
  waypointCandidates.sort((a,b) => a.d - b.d);
  regularCandidates.sort((a,b) => a.d - b.d);
  
  // PRIORITAS: coba konek ke waypoint dulu!
  const sorted = [...waypointCandidates, ...regularCandidates];
  
  console.log(`[${nodeId}] Mencari koneksi ke ${waypointCandidates.length} waypoint terdekat`);
  
  let connected = 0;
  for(const cand of sorted.slice(0, 100)){
    if(canSee(coord, nodes[cand.id].coord)){
      edges[nodeId].push(cand.id);
      if(!edges[cand.id].includes(nodeId)) edges[cand.id].push(nodeId);
      connected++;
      if(cand.isWp) console.log(`✅ ${nodeId} terhubung ke waypoint: ${cand.wpName} (${cand.d.toFixed(4)}°)`);
      if(connected >= 10) break;
    }
  }
  
  if(connected === 0){
    console.warn(`⚠️ ${nodeId} GAGAL terhubung ke node manapun!`);
  } else {
    console.log(`✅ ${nodeId} terhubung ke ${connected} node (${waypointCandidates.filter(w=>edges[nodeId].includes(w.id)).length} waypoint)`);
  }
}

// ============================================================
// A* IMPLEMENTATION
// ============================================================
class MinHeap {
  constructor(){ this.heap=[]; }
  push(node){ this.heap.push(node); this.bubbleUp(this.heap.length-1); }
  pop(){
    const min=this.heap[0];
    const last=this.heap.pop();
    if(this.heap.length){ this.heap[0]=last; this.sinkDown(0); }
    return min;
  }
  bubbleUp(i){
    while(i>0){
      const p=Math.floor((i-1)/2);
      if(this.heap[p][0] <= this.heap[i][0]) break;
      [this.heap[p], this.heap[i]] = [this.heap[i], this.heap[p]];
      i=p;
    }
  }
  sinkDown(i){
    const n=this.heap.length;
    while(true){
      let left=2*i+1, right=2*i+2, swap=null;
      if(left<n && this.heap[left][0] < this.heap[i][0]) swap=left;
      if(right<n && this.heap[right][0] < this.heap[swap??i][0]) swap=right;
      if(swap===null) break;
      [this.heap[i], this.heap[swap]] = [this.heap[swap], this.heap[i]];
      i=swap;
    }
  }
  get size(){ return this.heap.length; }
}

function astarFast(startId, endId, edges, getCoord) {
  const heap = new MinHeap();
  heap.push([0, startId]);
  const gScore = new Map(); gScore.set(startId, 0);
  const cameFrom = new Map();
  const visited = new Set();
  let iter = 0;
  
  while(heap.size > 0 && iter++ < MAX_ITER){
    const [f, curr] = heap.pop();
    if(visited.has(curr)) continue;
    visited.add(curr);
    if(curr === endId){
      const path = [curr];
      let c = curr;
      while(cameFrom.has(c)){
        c = cameFrom.get(c);
        path.push(c);
      }
      return path.reverse();
    }
    const neighbors = edges[curr] || [];
    for(const next of neighbors){
      if(visited.has(next)) continue;
      const g = (gScore.get(curr) || 0) + dist(getCoord(curr), getCoord(next));
      if(g < (gScore.get(next) || Infinity)){
        cameFrom.set(next, curr);
        gScore.set(next, g);
        const h = dist(getCoord(next), getCoord(endId));
        heap.push([g + h * 1.15, next]);
      }
    }
  }
  return [];
}

// ============================================================
// MAIN ROUTING
// ============================================================
async function runRoute() {
  if(!start || !end){ alert("Pilih Start dan End dulu!"); return; }
  if(isRouting){ alert("Sedang mencari rute..."); return; }
  isRouting = true;
  
  const GRID = stepVal();
  const SRAD = Math.max(GRID * 2.2, 0.065);
  
  showProgress(0);
  updateStatus("⚙️ Membangun grid + waypoint...", "#f39c12");
  await new Promise(r => setTimeout(r, 10));
  
  const nodes = buildAdaptiveGridWithWaypoints(start, end);
  
  const wpCount = nodes.filter(n=>n.isWaypoint).length;
  setInfo(`🌐 ${nodes.length} node (${wpCount} waypoint aktif)`);
  
  if(wpCount === 0 && waypoints.length > 0){
    updateStatus(`⚠️ PERINGATAN: ${waypoints.length} waypoint tidak masuk nodes!`, "#e67e22");
  } else {
    updateStatus(`🔗 ${wpCount} waypoint terdeteksi, membangun koneksi...`, "#e67e22");
  }
  
  const edges = await buildEdgesSmart(nodes, SRAD, pct => {
    showProgress(0.2 + pct * 0.6);
  });
  
  showProgress(0.85);
  updateStatus("📍 Menghubungkan Start/End...", "#e67e22");
  const idx = buildSpatialIndex(nodes, SRAD);
  const startId = "S_START", endId = "E_END";
  attachPointToGraph(start, nodes, edges, idx, SRAD, startId);
  attachPointToGraph(end, nodes, edges, idx, SRAD, endId);
  
  showProgress(0.95);
  updateStatus("🚀 Menghitung rute terbaik...", "#2ecc71");
  
  const getCoord = (id) => {
    if(id === startId) return start;
    if(id === endId) return end;
    return nodes[id].coord;
  };
  
  const pathIds = astarFast(startId, endId, edges, getCoord);
  showProgress(1.0);
  
  if(pathIds.length > 1){
    if(routeLine) map.removeLayer(routeLine);
    const coords = pathIds.map(id => getCoord(id));
    
    const waypointsOnRoute = [];
    for(let i=0; i<pathIds.length; i++){
      const id = pathIds[i];
      if(id !== startId && id !== endId && nodes[id]?.isWaypoint){
        waypointsOnRoute.push(nodes[id].waypointData?.name || `WP-${id}`);
      }
    }
    
    routeLine = L.polyline(coords, { color: '#2c3e50', weight: 5, opacity: 0.9 }).addTo(map);
    map.fitBounds(routeLine.getBounds(), { padding: [35,35] });
    let totalDist = 0;
    for(let i=1;i<coords.length;i++) totalDist += dist(coords[i-1], coords[i]);
    const km = (totalDist * 111).toFixed(1);
    const nm = (totalDist * 60).toFixed(0);
    
    let wpMsg = waypointsOnRoute.length > 0 ? ` ✅ via ${waypointsOnRoute.length} waypoint` : ' ⚠️ TIDAK melalui waypoint';
    updateStatus(`✅ Rute ditemukan! ${km} km (${nm} nm)${wpMsg}`, "#27ae60");
    setInfo(`🎯 ${pathIds.length} titik · ${wpCount} waypoint aktif · ${waypointsOnRoute.length} dilewati`);
    
    if(waypointsOnRoute.length > 0){
      console.log(`🎉 WAYPOINT DILEWATI: ${waypointsOnRoute.join(' → ')}`);
    } else {
      console.warn("⚠️ Rute TIDAK melewati waypoint padahal ada waypoint!");
    }
  } else {
    updateStatus("❌ Rute gagal ditemukan", "red");
    setInfo("💡 Coba perbesar Resolusi Grid atau pilih titik di perairan dalam");
  }
  
  setTimeout(() => hideProgress(), 800);
  isRouting = false;
}

// ============================================================
// UI FUNCTIONS
// ============================================================
function clearAll(){
  if(isRouting) return;
  if(routeLine){ map.removeLayer(routeLine); routeLine=null; }
  if(startMarker){ map.removeLayer(startMarker); startMarker=null; }
  if(endMarker){ map.removeLayer(endMarker); endMarker=null; }
  start=null; end=null; mode=null;
  updateStatus("🧹 Reset — pilih titik baru", "#7f8c8d");
}

function setMode(m){
  if(isRouting) return;
  mode=m;
  updateStatus(`📍 Klik di peta untuk titik ${m==='start' ? 'START' : 'TUJUAN'}`, "#3498db");
}

function updateStatus(txt, col="#e67e22"){
  const s=document.getElementById('status');
  s.innerText=txt; s.style.color=col;
}

function setInfo(txt){ document.getElementById('infoBox').innerHTML = txt; }

function showProgress(pct){
  document.getElementById('progressBar').style.display='block';
  document.getElementById('progressFill').style.width=Math.round(pct*100)+'%';
}

function hideProgress(){ document.getElementById('progressBar').style.display='none'; }

map.on('click', e => {
  if(!mode || isRouting) return;
  const p = [e.latlng.lat, e.latlng.lng];
  if(islands.length && isBlocked(p)){
    alert("⚠️ Itu daratan / pulau! Pilih di laut.");
    return;
  }
  if(mode === 'start'){
    start = p;
    if(startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p, { icon: L.divIcon({html:'🚢', iconSize:[28,28], className:'', iconAnchor:[14,14]}) }).addTo(map).bindPopup("Start");
  } else {
    end = p;
    if(endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p, { icon: L.divIcon({html:'🏁', iconSize:[28,28], className:'', iconAnchor:[14,14]}) }).addTo(map).bindPopup("End");
  }
  mode = null;
  updateStatus("✅ Titik tersimpan. Tekan 'Cari Rute Cepat'", "#27ae60");
});

window.addEventListener('load', () => {
  updateStepDisplay();
  document.getElementById('valFine').innerText = fineVal()+'×';
  updateStatus("Memuat islands.json & waypoint.json...");
});
</script>
</body>
</html>
