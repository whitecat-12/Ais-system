<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal (Versi Stabil & Luas)</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: absolute; top: 15px; left: 50px;
      background: white; padding: 15px;
      border-radius: 12px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 220px;
    }
    button { 
      width: 100%; margin-bottom: 8px; padding: 10px; 
      cursor: pointer; border: 1px solid #ddd; background: #f8f9fa; 
      border-radius: 6px; font-weight: bold;
    }
    .btn-run { background: #2ecc71; color: white; border: none; }
    .status-box { margin-top: 10px; font-size: 12px; text-align: center; font-weight: bold; }
    #status { color: #e67e22; }
  </style>
</head>
<body>

<div class="panel">
  <strong>Navigasi Kapal</strong><br><br>
  <button onclick="setMode('start')">📍 Tentukan Start</button>
  <button onclick="setMode('end')">🏁 Tentukan End</button>
  <button class="btn-run" onclick="runRoute()">🚀 Cari Rute Sekarang</button>
  <div class="status-box">Status: <span id="status">Memuat Pulau...</span></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- KONFIGURASI ANTI-BUNTU ---
const GRID_STEP = 0.025;      // Grid sedikit lebih longgar agar performa ringan
const K_NEAREST = 20;         // Mencari lebih banyak tetangga agar koneksi kuat
const SEARCH_RADIUS = 0.08;   // Radius koneksi diperlebar agar tidak mudah putus

var map = L.map('map').setView([-8.4, 115.1], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let islands = [], nodes = [], edges = {};
let start = null, end = null, mode = null;
let routeLine, startMarker, endMarker;

// --- 1. LOAD DATA ---
fetch('islands.json')
  .then(res => res.json())
  .then(async data => {
    islands = data.islands;
    islands.forEach(isl => {
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length - 1]) isl.polygon.push(isl.polygon[0]);
      L.polygon(isl.polygon, {color: 'red', weight: 1, fillOpacity: 0.1, interactive: false}).addTo(map);
    });
    
    updateStatus("Membuat Jalur Laut...");
    await sleep(50);
    generateNodes();
    await connectGraphAsync();
    updateStatus("Sistem Siap ✅", "#27ae60");
  });

// --- 2. GEOMETRY ENGINE ---
function pointInPolygon(p, vs) {
  let x = p[0], y = p[1], inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i][0], yi = vs[i][1], xj = vs[j][0], yj = vs[j][1];
    if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function isBlocked(p) {
  for (let i = 0; i < islands.length; i++) {
    if (pointInPolygon(p, islands[i].polygon)) return true;
  }
  return false;
}

function canSee(a, b) {
  let d = dist(a, b);
  let steps = Math.max(5, Math.ceil(d / 0.015)); 
  for (let i = 1; i < steps; i++) {
    let t = i / steps;
    let p = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
    if (isBlocked(p)) return false;
  }
  return true;
}

function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }

// --- 3. GRAPH ENGINE ---
function generateNodes() {
  // Area diperluas agar mencakup seluruh Jawa Timur ke Bali
  for (let lat = -9.5; lat < -7.5; lat += GRID_STEP) {
    for (let lng = 113.5; lng < 116.5; lng += GRID_STEP) {
      let p = [lat, lng];
      if (!isBlocked(p)) nodes.push({ id: nodes.length, coord: p });
    }
  }
}

async function connectGraphAsync() {
  for (let i = 0; i < nodes.length; i++) {
    let a = nodes[i];
    edges[a.id] = [];
    
    let candidates = nodes.filter(b => {
      if (a.id === b.id) return false;
      return Math.abs(a.coord[0] - b.coord[0]) < SEARCH_RADIUS && 
             Math.abs(a.coord[1] - b.coord[1]) < SEARCH_RADIUS;
    });

    candidates.map(b => ({ id: b.id, d: dist(a.coord, b.coord) }))
      .sort((x, y) => x.d - y.d)
      .slice(0, K_NEAREST)
      .forEach(n => {
        if (canSee(a.coord, nodes[n.id].coord)) edges[a.id].push(n.id);
      });

    if (i % 300 === 0) {
      updateStatus(`Menghubungkan: ${Math.round((i/nodes.length)*100)}%`);
      await sleep(1);
    }
  }
}

// --- 4. NAVIGATION ---
function runRoute() {
  if (!start || !end) { alert("Tentukan lokasi awal dan tujuan!"); return; }
  updateStatus("Mencari Jalan...");

  let sId = nodes.length, eId = nodes.length + 1;
  let tempEdges = JSON.parse(JSON.stringify(edges)); 
  
  // Hubungkan Start & End ke Grid dengan radius SANGAT besar agar tidak buntu
  [ {id: sId, coord: start}, {id: eId, coord: end} ].forEach(tmp => {
    tempEdges[tmp.id] = [];
    nodes.filter(n => dist(tmp.coord, n.coord) < 0.5) // Radius 0.5 derajat (~50km)
         .sort((a,b) => dist(tmp.coord, a.coord) - dist(tmp.coord, b.coord))
         .slice(0, 30) // Ambil 30 titik grid terdekat
         .forEach(n => {
           if (canSee(tmp.coord, n.coord)) {
             tempEdges[tmp.id].push(n.id);
             if (!tempEdges[n.id]) tempEdges[n.id] = [];
             tempEdges[n.id].push(tmp.id);
           }
         });
  });

  let path = astar(sId, eId, tempEdges);
  if (path.length > 0) {
    if (routeLine) map.removeLayer(routeLine);
    let coords = path.map(id => {
      if (id === sId) return start;
      if (id === eId) return end;
      return nodes[id].coord;
    });
    routeLine = L.polyline(coords, {color: '#007bff', weight: 6}).addTo(map);
    map.fitBounds(routeLine.getBounds());
    updateStatus("Rute Berhasil! ✅");
  } else {
    updateStatus("Gagal (Buntu) ❌", "#c0392b");
    alert("Lokasi ini terisolasi. Coba klik sedikit menjauh dari dermaga/garis pantai.");
  }
}

function astar(s, e, graph) {
  let open = [s], cameFrom = {}, gScore = {[s]: 0}, fScore = {[s]: dist(getCoord(s), getCoord(e))};

  function getCoord(id) {
    if (id === s) return start;
    if (id === e) return end;
    return nodes[id].coord;
  }

  while (open.length > 0) {
    let curr = open.reduce((a, b) => fScore[a] < fScore[b] ? a : b);
    if (curr === e) {
      let res = [curr];
      while (cameFrom[curr] !== undefined) { curr = cameFrom[curr]; res.push(curr); }
      return res.reverse();
    }
    open = open.filter(i => i !== curr);
    (graph[curr] || []).forEach(next => {
      let g = gScore[curr] + dist(getCoord(curr), getCoord(next));
      if (gScore[next] === undefined || g < gScore[next]) {
        cameFrom[next] = curr;
        gScore[next] = g;
        fScore[next] = g + dist(getCoord(next), getCoord(e));
        if (!open.includes(next)) open.push(next);
      }
    });
  }
  return [];
}

function setMode(m) { mode = m; updateStatus("Klik di peta..."); }
function updateStatus(txt, col) { const s = document.getElementById('status'); s.innerText = txt; if(col) s.style.color = col; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

map.on('click', e => {
  let p = [e.latlng.lat, e.latlng.lng];
  if (isBlocked(p)) { alert("Itu daratan!"); return; }
  if (mode === 'start') { start = p; if(startMarker) map.removeLayer(startMarker); startMarker = L.marker(p).addTo(map); }
  else if (mode === 'end') { end = p; if(endMarker) map.removeLayer(endMarker); endMarker = L.marker(p).addTo(map); }
  mode = null; updateStatus("Siap");
});
</script>
</body>
</html>
