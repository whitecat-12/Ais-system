<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal (Fast & Smart)</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: absolute; top: 15px; left: 50px;
      background: rgba(255, 255, 255, 0.95); padding: 15px;
      border-radius: 12px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 220px;
    }
    button { 
      width: 100%; margin-bottom: 8px; padding: 10px; 
      cursor: pointer; border: 1px solid #ddd; background: white; 
      border-radius: 6px; font-weight: bold; transition: 0.3s;
    }
    button:hover { background: #f0f0f0; }
    .btn-run { background: #2ecc71; color: white; border: none; }
    .btn-run:hover { background: #27ae60; }
    .status-box { 
      margin-top: 10px; padding: 8px; border-radius: 4px;
      font-size: 12px; background: #eee; text-align: center;
    }
    #status { color: #e67e22; font-weight: bold; }
  </style>
</head>
<body>

<div class="panel">
  <strong>Navigasi Kapal</strong><br><br>
  <button onclick="setMode('start')">📍 Set Start</button>
  <button onclick="setMode('end')">🏁 Set End</button>
  <button class="btn-run" onclick="runRoute()">🚀 Cari Rute</button>
  <div class="status-box">
    Status: <span id="status">Loading data...</span>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- KONFIGURASI HIGH PERFORMANCE ---
const GRID_STEP = 0.018;   // Keseimbangan terbaik antara kecepatan & ketelitian selat
const K_NEAREST = 15;      // Jumlah koneksi optimal
const SEARCH_RADIUS = 0.04; // Radius maksimal pencarian tetangga (kunci kecepatan)

var map = L.map('map').setView([-8.4, 115.1], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let islands = [], nodes = [], edges = {};
let start = null, end = null, mode = null;
let routeLine, startMarker, endMarker;

// --- 1. INITIALIZATION ---
fetch('islands.json')
  .then(res => res.json())
  .then(async data => {
    islands = data.islands;
    islands.forEach(isl => {
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length - 1]) isl.polygon.push(isl.polygon[0]);
      L.polygon(isl.polygon, {color: '#c0392b', weight: 1, fillOpacity: 0.1, interactive: false}).addTo(map);
    });
    
    updateStatus("Memetakan laut...");
    await sleep(50);
    generateNodes();
    
    updateStatus("Menghubungkan...");
    await connectGraphAsync();
    
    updateStatus("Siap digunakan", "#27ae60");
  });

// --- 2. GEOMETRY ENGINE (FAST) ---
function pointInPolygon(p, vs) {
  let x = p[0], y = p[1], inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i][0], yi = vs[i][1], xj = vs[j][0], yj = vs[j][1];
    if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function isBlocked(p) {
  for (let i = 0; i < islands.length; i++) {
    if (pointInPolygon(p, islands[i].polygon)) return true;
  }
  return false;
}

function canSee(a, b) {
  let d = dist(a, b);
  let steps = Math.max(6, Math.ceil(d / 0.01)); 
  for (let i = 1; i < steps; i++) {
    let t = i / steps;
    let p = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
    if (isBlocked(p)) return false;
  }
  return true;
}

function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }

// --- 3. GRAPH ENGINE ---
function generateNodes() {
  // Fokus hanya pada area sekitar Bali & Selat
  for (let lat = -9.1; lat < -7.9; lat += GRID_STEP) {
    for (let lng = 114.2; lng < 115.8; lng += GRID_STEP) {
      let p = [lat, lng];
      if (!isBlocked(p)) nodes.push({ id: nodes.length, coord: p });
    }
  }
}

async function connectGraphAsync() {
  for (let i = 0; i < nodes.length; i++) {
    let a = nodes[i];
    edges[a.id] = [];
    
    // Filter cepat berdasarkan jarak absolut sebelum hitung hypot & canSee
    let candidates = nodes.filter(b => {
      if (a.id === b.id) return false;
      let dLat = Math.abs(a.coord[0] - b.coord[0]);
      let dLng = Math.abs(a.coord[1] - b.coord[1]);
      return dLat < SEARCH_RADIUS && dLng < SEARCH_RADIUS;
    });

    let neighbors = candidates
      .map(b => ({ id: b.id, d: dist(a.coord, b.coord) }))
      .sort((x, y) => x.d - y.d)
      .slice(0, K_NEAREST);

    neighbors.forEach(n => {
      if (canSee(a.coord, nodes[n.id].coord)) edges[a.id].push(n.id);
    });

    if (i % 200 === 0) {
      updateStatus(`${Math.round((i/nodes.length)*100)}%...`);
      await sleep(1);
    }
  }
}

// --- 4. NAVIGATION (A*) ---
function runRoute() {
  if (!start || !end) { alert("Pilih Start dan End dulu!"); return; }
  updateStatus("Menghitung rute...", "#2980b9");

  // Temporary connection for Start & End
  let sNode = { id: nodes.length, coord: start };
  let eNode = { id: nodes.length + 1, coord: end };
  
  [sNode, eNode].forEach(tmp => {
    edges[tmp.id] = [];
    nodes.filter(n => dist(tmp.coord, n.coord) < 0.3)
         .forEach(n => {
           if (canSee(tmp.coord, n.coord)) {
             edges[tmp.id].push(n.id);
             if (!edges[n.id]) edges[n.id] = [];
             edges[n.id].push(tmp.id);
           }
         });
  });

  let path = astar(sNode, eNode);
  if (path.length > 0) {
    if (routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(path, {color: '#2ecc71', weight: 6, opacity: 0.8, lineJoin: 'round'}).addTo(map);
    map.fitBounds(routeLine.getBounds());
    updateStatus("Rute ditemukan", "#27ae60");
  } else {
    updateStatus("Rute buntu", "#c0392b");
    alert("Kapal tidak bisa lewat. Coba pindahkan titik ke laut yang lebih terbuka.");
  }
}

function astar(startNode, endNode) {
  let open = [startNode.id], cameFrom = {}, gScore = {}, fScore = {};
  gScore[startNode.id] = 0;
  fScore[startNode.id] = dist(startNode.coord, endNode.coord);

  while (open.length > 0) {
    let currentId = open.reduce((a, b) => fScore[a] < fScore[b] ? a : b);
    if (currentId === endNode.id) {
      let p = [currentId];
      while (cameFrom[currentId] !== undefined) {
        currentId = cameFrom[currentId];
        p.push(currentId);
      }
      return p.reverse().map(id => id >= nodes.length ? (id === nodes.length ? startNode.coord : endNode.coord) : nodes[id].coord);
    }
    open = open.filter(id => id !== currentId);

    (edges[currentId] || []).forEach(neighborId => {
      let d = dist(currentId >= nodes.length ? (currentId === nodes.length ? startNode.coord : endNode.coord) : nodes[currentId].coord, 
                   neighborId >= nodes.length ? (neighborId === nodes.length ? startNode.coord : endNode.coord) : nodes[neighborId].coord);
      let tentativeG = gScore[currentId] + d;
      if (gScore[neighborId] === undefined || tentativeG < gScore[neighborId]) {
        cameFrom[neighborId] = currentId;
        gScore[neighborId] = tentativeG;
        fScore[neighborId] = tentativeG + dist(neighborId >= nodes.length ? (neighborId === nodes.length ? startNode.coord : endNode.coord) : nodes[neighborId].coord, endNode.coord);
        if (!open.includes(neighborId)) open.push(neighborId);
      }
    });
  }
  return [];
}

// --- 5. HELPER ---
function setMode(m) { mode = m; updateStatus("Klik pada peta..."); }
function updateStatus(txt, color) { 
  const el = document.getElementById('status');
  el.innerText = txt; 
  if(color) el.style.color = color;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

map.on('click', e => {
  let p = [e.latlng.lat, e.latlng.lng];
  if (isBlocked(p)) { alert("Itu daratan!"); return; }
  if (mode === 'start') {
    start = p;
    if (startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map);
  } else if (mode === 'end') {
    end = p;
    if (endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map);
  }
  mode = null;
  updateStatus("Siap");
});
</script>
</body>
</html>
