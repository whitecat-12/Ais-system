<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal PRO (Anti Tabrak + Smooth)</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    button {
      margin: 5px;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="panel">
  <button onclick="setMode('start')">Start</button>
  <button onclick="setMode('end')">End</button>
  <button onclick="runRoute()">Cari Rute</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==========================
// MAP
// ==========================
var map = L.map('map').setView([-7,110],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ==========================
// STATE
// ==========================
let islands = [];
let mode = null;
let start = null;
let end = null;
let startMarker, endMarker, routeLine;

// ==========================
// LOAD JSON
// ==========================
fetch('islands.json')
.then(res => res.json())
.then(data => {

  islands = data.islands;

  islands.forEach(island => {
    island.polygon.push(island.polygon[0]);

    L.polygon(island.polygon, {
      color:'red'
    }).addTo(map);
  });

});

// ==========================
// MODE
// ==========================
function setMode(m){
  mode = m;
}

// ==========================
// CLICK MAP
// ==========================
map.on('click', function(e){

  let p = [e.latlng.lat, e.latlng.lng];

  if(mode === 'start'){
    start = p;
    if(startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map).bindPopup("Start");
  }

  if(mode === 'end'){
    end = p;
    if(endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map).bindPopup("End");
  }

});

// ==========================
// POINT IN POLYGON
// ==========================
function pointInPolygon(point, vs){
  let x = point[0], y = point[1];
  let inside = false;

  for(let i=0, j=vs.length-1; i<vs.length; j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];

    let intersect = ((yi>y)!=(yj>y)) &&
      (x < (xj-xi)*(y-yi)/(yj-yi)+xi);

    if(intersect) inside = !inside;
  }

  return inside;
}

// ==========================
// CEK GARIS TABRAKAN
// ==========================
function lineIntersectsPolygon(a, b, polygon) {

  for (let i = 0; i < polygon.length - 1; i++) {
    let c = polygon[i];
    let d = polygon[i + 1];

    if (linesIntersect(a, b, c, d)) {
      return true;
    }
  }
  return false;
}

function linesIntersect(a,b,c,d){

  function ccw(p1,p2,p3){
    return (p3[0]-p1[0])*(p2[1]-p1[1]) >
           (p2[0]-p1[0])*(p3[1]-p1[1]);
  }

  return (ccw(a,c,d) != ccw(b,c,d)) &&
         (ccw(a,b,c) != ccw(a,b,d));
}

// ==========================
// CEK BLOCK (dengan buffer)
// ==========================
function isBlocked(point){

  let buffer = 0.05; // ~5km

  for(let island of islands){

    if(pointInPolygon(point, island.polygon)){
      return true;
    }

    for(let p of island.polygon){
      let d = Math.hypot(point[0]-p[0], point[1]-p[1]);
      if(d < buffer){
        return true;
      }
    }
  }

  return false;
}

// ==========================
// GRID
// ==========================
let step = 0.05;

function toKey(p){
  return p[0].toFixed(3)+","+p[1].toFixed(3);
}

// ==========================
// A*
// ==========================
function astar(start,end){

  let open=[start];
  let cameFrom={};
  let g={}, f={};

  g[toKey(start)] = 0;
  f[toKey(start)] = dist(start,end);

  while(open.length){

    open.sort((a,b)=>f[toKey(a)]-f[toKey(b)]);
    let cur = open.shift();

    if(dist(cur,end) < step){
      return reconstruct(cameFrom,cur);
    }

    for(let n of neighbors(cur)){

      if(isBlocked(n)) continue;

      // 🔥 CEK GARIS TABRAKAN
      let collision = false;

      for (let island of islands) {
        if (lineIntersectsPolygon(cur, n, island.polygon)) {
          collision = true;
          break;
        }
      }

      if (collision) continue;

      let key = toKey(n);
      let temp = g[toKey(cur)] + dist(cur,n);

      if(g[key] === undefined || temp < g[key]){
        cameFrom[key] = cur;
        g[key] = temp;
        f[key] = temp + dist(n,end);

        if(!open.find(p => toKey(p) === key)){
          open.push(n);
        }
      }
    }
  }

  return [];
}

// ==========================
// 🔥 32 DIRECTION
// ==========================
function neighbors(p){
  let result = [];
  let directions = 32;

  for(let i = 0; i < directions; i++){
    let angle = (2 * Math.PI / directions) * i;

    let dx = step * Math.cos(angle);
    let dy = step * Math.sin(angle);

    result.push([
      p[0] + dx,
      p[1] + dy
    ]);
  }

  return result;
}

// ==========================
// DISTANCE
// ==========================
function dist(a,b){
  return Math.hypot(a[0]-b[0], a[1]-b[1]);
}

// ==========================
// RECONSTRUCT
// ==========================
function reconstruct(cameFrom,cur){
  let path=[cur];

  while(cameFrom[toKey(cur)]){
    cur = cameFrom[toKey(cur)];
    path.push(cur);
  }

  return path.reverse();
}

// ==========================
// 🔥 SMOOTH BEZIER
// ==========================
function smoothPath(path){

  if(path.length < 3) return path;

  let smooth = [];

  for (let i = 0; i < path.length - 2; i++) {

    let p0 = path[i];
    let p1 = path[i + 1];
    let p2 = path[i + 2];

    for (let t = 0; t <= 1; t += 0.2) {

      let lat = (1-t)*(1-t)*p0[0] + 
                2*(1-t)*t*p1[0] + 
                t*t*p2[0];

      let lng = (1-t)*(1-t)*p0[1] + 
                2*(1-t)*t*p1[1] + 
                t*t*p2[1];

      smooth.push([lat,lng]);
    }
  }

  return smooth;
}

// ==========================
// RUN
// ==========================
function runRoute(){

  if(islands.length === 0){
    alert("Data pulau belum load!");
    return;
  }

  if(!start || !end){
    alert("Pilih start & end dulu!");
    return;
  }

  let rawPath = astar(start,end);
  let path = smoothPath(rawPath);

  if(routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(path,{
    color:'blue',
    weight:4
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

// ==========================
// RESET
// ==========================
function resetAll(){

  if(startMarker) map.removeLayer(startMarker);
  if(endMarker) map.removeLayer(endMarker);
  if(routeLine) map.removeLayer(routeLine);

  start = null;
  end = null;
}

</script>

</body>
</html>
