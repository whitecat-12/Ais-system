<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal (Anti-Lag Version)</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .panel {
      position: absolute; top: 15px; left: 50px;
      background: rgba(255, 255, 255, 0.9); padding: 15px;
      border-radius: 8px; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button { padding: 8px 12px; cursor: pointer; border: 1px solid #ccc; background: white; border-radius: 4px; font-weight: bold; }
    button:hover { background: #f0f0f0; }
    .info { margin-top: 10px; font-size: 12px; color: #d32f2f; font-weight: bold; }
  </style>
</head>
<body>

<div class="panel">
  <strong>Kontrol Rute:</strong><br><br>
  <button onclick="setMode('start')">1. Klik Start</button>
  <button onclick="setMode('end')">2. Klik End</button>
  <button onclick="runRoute()" style="background: #4CAF50; color: white; border: none;">3. Cari Rute</button>
  <div class="info" id="status">Status: Menunggu data...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// --- KONFIGURASI AMAN ---
const GRID_STEP = 0.012;      // Seimbang antara akurasi selat dan beban CPU
const K_NEAREST = 20;         // Dikurangi sedikit agar beban connectGraph lebih ringan
const COLLISION_MARGIN = 0.001; 

var map = L.map('map').setView([-8.4, 115.1], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let islands = [];
let nodes = [];
let edges = {};
let start = null, end = null;
let mode = null;
let routeLine, startMarker, endMarker;

// --- 1. LOAD DATA ---
fetch('islands.json')
  .then(res => res.json())
  .then(data => {
    islands = data.islands;
    islands.forEach(isl => {
      if (isl.polygon[0] !== isl.polygon[isl.polygon.length - 1]) isl.polygon.push(isl.polygon[0]);
      L.polygon(isl.polygon, {color: 'red', weight: 1, fillOpacity: 0.1, interactive: false}).addTo(map);
    });
    
    // Gunakan fase-fase agar tidak hang
    initSystem();
  });

async function initSystem() {
    updateStatus("Membangun Node...");
    await sleep(100);
    generateNodes();
    
    updateStatus("Menghubungkan Jaringan (Mohon Tunggu)...");
    await sleep(100);
    await connectGraphAsync();
    
    updateStatus("Sistem Siap!");
    document.getElementById('status').style.color = "green";
}

// --- 2. GEOMETRY ---
function pointInPolygon(p, vs) {
  let x = p[0], y = p[1], inside = false;
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    let xi = vs[i][0], yi = vs[i][1], xj = vs[j][0], yj = vs[j][1];
    if (((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function isBlocked(p) {
  for (let isl of islands) { if (pointInPolygon(p, isl.polygon)) return true; }
  return false;
}

function canSee(a, b) {
  let d = dist(a, b);
  let steps = Math.max(8, Math.ceil(d / 0.008)); 
  for (let i = 0; i <= steps; i++) {
    let t = i / steps;
    let p = [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t];
    if (isBlocked(p)) return false;
  }
  return true;
}

function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }

// --- 3. ASYNC GENERATION ---
function generateNodes() {
  for (let lat = -9.2; lat < -7.8; lat += GRID_STEP) {
    for (let lng = 114.2; lng < 115.8; lng += GRID_STEP) {
      let p = [lat, lng];
      if (!isBlocked(p)) nodes.push({ id: nodes.length, coord: p });
    }
  }
}

// Rahasia agar tidak Unresponsive: pecah loop besar jadi chunk kecil
async function connectGraphAsync() {
  const chunkSize = 100; // Proses 100 node, lalu istirahat sebentar
  for (let i = 0; i < nodes.length; i++) {
    let a = nodes[i];
    edges[a.id] = [];
    
    let neighbors = nodes
      .filter(b => b.id !== a.id && dist(a.coord, b.coord) < GRID_STEP * 4) // Filter jarak dulu agar cepat
      .map(b => ({ id: b.id, d: dist(a.coord, b.coord) }))
      .sort((x, y) => x.d - y.d)
      .slice(0, K_NEAREST);

    neighbors.forEach(n => {
      if (canSee(a.coord, nodes[n.id].coord)) edges[a.id].push(n.id);
    });

    if (i % chunkSize === 0) {
      updateStatus(`Menghubungkan: ${Math.round((i/nodes.length)*100)}%`);
      await sleep(1); // Kasih nafas ke browser
    }
  }
}

// --- 4. ALGORITMA A* ---
function astar(startNode, endNode) {
  let open = [startNode.id], cameFrom = {}, gScore = {}, fScore = {};
  gScore[startNode.id] = 0;
  fScore[startNode.id] = dist(startNode.coord, endNode.coord);

  while (open.length > 0) {
    let currentId = open.reduce((a, b) => fScore[a] < fScore[b] ? a : b);
    if (currentId === endNode.id) return reconstructPath(cameFrom, currentId);
    open = open.filter(id => id !== currentId);

    for (let neighborId of (edges[currentId] || [])) {
      let tentativeG = gScore[currentId] + dist(nodes[currentId].coord, nodes[neighborId].coord);
      if (gScore[neighborId] === undefined || tentativeG < gScore[neighborId]) {
        cameFrom[neighborId] = currentId;
        gScore[neighborId] = tentativeG;
        fScore[neighborId] = tentativeG + dist(nodes[neighborId].coord, endNode.coord);
        if (!open.includes(neighborId)) open.push(neighborId);
      }
    }
  }
  return [];
}

function reconstructPath(cameFrom, current) {
  let path = [current];
  while (cameFrom[current] !== undefined) { current = cameFrom[current]; path.push(current); }
  return path.reverse().map(id => nodes[id].coord);
}

// --- 5. UI ---
function setMode(m) { mode = m; }
function updateStatus(txt) { document.getElementById('status').innerText = "Status: " + txt; }
function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

map.on('click', e => {
  let p = [e.latlng.lat, e.latlng.lng];
  if (isBlocked(p)) return;
  if (mode === 'start') {
    start = p;
    if (startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map).bindPopup("Start").openPopup();
  } else if (mode === 'end') {
    end = p;
    if (endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map).bindPopup("End").openPopup();
  }
});

function runRoute() {
  if (!start || !end) return;
  updateStatus("Mencari rute...");

  let sNode = { id: nodes.length, coord: start };
  let eNode = { id: nodes.length + 1, coord: end };
  
  [sNode, eNode].forEach(tmp => {
    edges[tmp.id] = [];
    nodes.filter(n => dist(tmp.coord, n.coord) < 0.25)
         .forEach(n => {
           if (canSee(tmp.coord, n.coord)) {
             edges[tmp.id].push(n.id);
             if (!edges[n.id]) edges[n.id] = [];
             edges[n.id].push(tmp.id);
           }
         });
  });

  let path = astar(sNode, eNode);
  if (path.length > 0) {
    if (routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(path, {color: '#0066ff', weight: 5}).addTo(map);
    map.fitBounds(routeLine.getBounds());
    updateStatus("Selesai!");
  } else {
    alert("Rute tidak terjangkau!");
  }
}
</script>
</body>
</html>
