<!DOCTYPE html>
<html>
<head>
  <title>Marine Router Indonesia - Smart Route Laut</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
      background: #eef5ff; /* soft putih biru */
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
    }

    #map {
      height: 100%;
      width: 100%;
      z-index: 1;
    }

    /* Sembunyikan tombol zoom bawaan Leaflet ( + dan - ) */
    .leaflet-control-zoom {
      display: none !important;
    }

    /* ---------- PANEL RESPONSIF (PUTIH & BIRU) ---------- */
    .route-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      z-index: 1000;
      box-shadow: 0 16px 40px rgba(0, 20, 50, 0.2);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.25s ease;
      border: 1px solid rgba(0, 100, 148, 0.25);
      color: #014361;
    }

    /* header: judul + tombol close/expand */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid rgba(0, 100, 148, 0.2);
      background: rgba(255, 255, 255, 0.85);
      border-radius: 32px 32px 0 0;
    }

    .panel-header:active {
      background: rgba(220, 240, 255, 0.9);
    }

    .title-section {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.2px;
      color: #005a8c;
    }

    .title-section span:first-child {
      font-size: 1.5rem;
    }

    .sub-badge {
      font-size: 0.65rem;
      background: #d4eaff;
      color: #006699;
      padding: 2px 8px;
      border-radius: 40px;
      font-weight: normal;
      margin-left: 6px;
      border: 0.5px solid #a0c8e0;
    }

    .toggle-btn {
      background: rgba(0, 100, 148, 0.12);
      border: none;
      color: #006c9e;
      font-size: 1.3rem;
      width: 36px;
      height: 36px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }

    .toggle-btn:active {
      background: rgba(0, 100, 148, 0.3);
      transform: scale(0.94);
    }

    /* konten yang bisa disembunyikan */
    .panel-content {
      padding: 16px;
      max-height: 70vh;
      overflow-y: auto;
      transition: all 0.2s;
      scrollbar-width: thin;
    }

    /* saat panel tertutup */
    .route-panel.collapsed .panel-content {
      display: none;
    }

    .route-panel.collapsed .panel-header {
      border-bottom: none;
      border-radius: 32px;
    }

    /* form grup (putih + biru lembut) */
    .coord-group {
      background: #ffffffcc;
      border-radius: 24px;
      padding: 12px 14px;
      margin-bottom: 14px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(0, 110, 150, 0.2);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .coord-title {
      font-weight: 700;
      font-size: 0.8rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #0077aa;
      letter-spacing: 0.3px;
    }

    .coord-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .coord-row input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 40px;
      border: 1px solid #cde3ef;
      background: #ffffff;
      color: #004466;
      font-size: 0.85rem;
      font-family: 'Monaco', monospace;
      transition: 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .coord-row input::placeholder {
      color: #7f9eb5;
      font-size: 0.75rem;
    }

    .coord-row input:focus {
      outline: none;
      border-color: #2c9bcb;
      background: #f9feff;
      box-shadow: 0 0 0 3px rgba(44, 155, 203, 0.2);
    }

    .btn-sm {
      background: #eef4fa;
      border: 1px solid #b9d6ed;
      padding: 8px 14px;
      border-radius: 36px;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.1s;
      color: #00668c;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-sm:active {
      transform: scale(0.96);
      background: #d9e9f5;
    }

    .btn-primary {
      background: #cae3f5;
      color: #00577a;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin: 12px 0;
    }

    button {
      flex: 1;
      padding: 12px 5px;
      border: none;
      border-radius: 44px;
      font-weight: 800;
      font-size: 0.8rem;
      transition: all 0.15s;
      cursor: pointer;
    }

    .b-start {
      background: #b6ddf5;
      color: #005a8a;
      border: 1px solid #8dc0df;
    }

    .b-end {
      background: #d9e0f0;
      color: #3a618b;
      border: 1px solid #b0c4de;
    }

    .b-run {
      background: #1976a5;
      color: white;
      width: 100%;
      margin-bottom: 10px;
      font-size: 0.9rem;
      padding: 14px;
      border: none;
      box-shadow: 0 2px 6px rgba(0,80,120,0.2);
    }

    .b-clear {
      background: #eef2f5;
      color: #3d6f8f;
      border: 1px solid #cbdae5;
      width: 100%;
    }

    .status-wrap {
      background: #e6f2fa;
      border-radius: 40px;
      padding: 8px 12px;
      margin: 12px 0;
      font-size: 0.75rem;
      text-align: center;
      font-weight: 500;
      color: #014361;
    }

    #status {
      font-weight: 700;
      color: #c4450f;
    }

    #progressBar {
      width: 100%;
      height: 4px;
      background: #cfe3ef;
      border-radius: 6px;
      margin: 8px 0;
      display: none;
    }

    #progressFill {
      height: 100%;
      background: #0f7bae;
      border-radius: 6px;
      width: 0%;
    }

    .info {
      font-size: 0.7rem;
      background: #eef4fa;
      border-radius: 20px;
      padding: 10px 12px;
      line-height: 1.4;
      margin-top: 12px;
      border-left: 3px solid #2c9bcb;
      color: #015f88;
    }

    .hint {
      font-size: 0.6rem;
      color: #5a7f9a;
      text-align: center;
      margin-top: 12px;
    }

    .warning-badge {
      background: #fff0e0;
      color: #b85c00;
      padding: 6px 10px;
      border-radius: 26px;
      font-size: 0.7rem;
      text-align: center;
      margin-top: 8px;
      border: 0.5px solid #ffcc88;
    }

    /* responsif sentuhan untuk layar kecil */
    @media (max-width: 550px) {
      .panel-content {
        padding: 12px;
        max-height: 65vh;
      }
      .coord-row input {
        padding: 10px 12px;
        font-size: 0.8rem;
      }
      .btn-sm {
        padding: 7px 12px;
      }
      .panel-header {
        padding: 12px 16px;
      }
      .title-section {
        font-size: 1rem;
      }
      .b-run {
        padding: 12px;
      }
    }

    /* scroll halus */
    .panel-content::-webkit-scrollbar {
      width: 4px;
    }
    .panel-content::-webkit-scrollbar-track {
      background: #d9e6f2;
      border-radius: 10px;
    }
    .panel-content::-webkit-scrollbar-thumb {
      background: #6c9fbf;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="route-panel" id="routePanel">
  <div class="panel-header" id="panelHeader">
    <div class="title-section">
      <span>⚓</span> SeaRouter ID
      <span class="sub-badge">Marine GIS</span>
    </div>
    <div class="toggle-btn" id="togglePanelBtn">▼</div>
  </div>
  <div class="panel-content">
    <!-- START grup -->
    <div class="coord-group">
      <div class="coord-title">📍 TITIK AWAL (LAT, LON)</div>
      <div class="coord-row">
        <input type="text" id="startLat" placeholder="Latitude ex: -6.2088" value="">
        <input type="text" id="startLng" placeholder="Longitude ex: 106.8456" value="">
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;">
        <button class="btn-sm" id="applyStartBtn">📍 Terapkan Start</button>
        <button class="btn-sm" id="pickStartMapBtn" style="background:#d4eaff;">🗺️ Pilih di Peta</button>
      </div>
    </div>

    <!-- FINISH grup -->
    <div class="coord-group">
      <div class="coord-title">🏁 TITIK AKHIR (LAT, LON)</div>
      <div class="coord-row">
        <input type="text" id="endLat" placeholder="Latitude ex: -7.2575" value="">
        <input type="text" id="endLng" placeholder="Longitude ex: 112.7521" value="">
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;">
        <button class="btn-sm" id="applyEndBtn">🏁 Terapkan Finish</button>
        <button class="btn-sm" id="pickEndMapBtn" style="background:#cbdaf0;">🗺️ Pilih di Peta</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="b-start" id="modeStartBtn">📍 Start (Pilih Peta)</button>
      <button class="b-end" id="modeEndBtn">🏁 Finish (Pilih Peta)</button>
    </div>
    <button class="b-run" id="runRouteBtn">⚡ HITUNG RUTE LAUT</button>
    <button class="b-clear" id="clearAllBtn">🗑️ Reset Semua & Hapus Rute</button>

    <div class="status-wrap">📡 <span id="status">Memuat data kelautan...</span></div>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div class="info" id="infoBox">🌊 Masukkan koordinat start & finish, atau klik pilih di peta.<br>Kedua kolom awal kosong.</div>
    <div class="hint">💡 Rute pintar hindari daratan • ribuan waypoint tersembunyi</div>
    <div class="warning-badge" id="reminderMsg">⚠️ Isi start & finish sebelum hitung rute</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ═══════════════════════════════════════════════════════════════════════
  // KONSTANTA & STATE
  // ═══════════════════════════════════════════════════════════════════════
  const WP_CONNECT_RADIUS = 3.0;
  const WP_K_NEAR         = 9;
  const MAX_ITER          = 220000;
  
  let islands   = [];
  let waypoints = [];
  let wpGraph   = {};
  let wpReady   = false;
  let islandsReady = false;
  
  let start = null;      // [lat, lng]
  let end   = null;
  let mode  = null;      // 'start' or 'end'
  let routeLine, startMarker, endMarker;
  let isRouting = false;
  
  // Peta global: zoomControl di-disable agar tombol + dan - tidak muncul
  const map = L.map('map', { zoomControl: false, attributionControl: true }).setView([-2.5, 118], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
  
  // ======================= GEOMETRI & DETEKSI DARATAN =====================
  function dist(a, b) {
    return Math.hypot(a[0] - b[0], a[1] - b[1]);
  }
  
  function distKm(a, b) {
    const R = 6371;
    const dLat = (b[0]-a[0]) * Math.PI/180;
    const dLng = (b[1]-a[1]) * Math.PI/180;
    const lat1 = a[0]*Math.PI/180, lat2 = b[0]*Math.PI/180;
    const s = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
  }
  
  function pointInPolygon(p, vs) {
    let inside = false;
    for (let i = 0, j = vs.length-1; i < vs.length; j = i++) {
      const xi=vs[i][0], yi=vs[i][1], xj=vs[j][0], yj=vs[j][1];
      if (((yi > p[1]) !== (yj > p[1])) && (p[0] < (xj-xi)*(p[1]-yi)/(yj-yi)+xi))
        inside = !inside;
    }
    return inside;
  }
  
  function isBlocked(lat, lng) {
    if (!islands.length) return false;
    for (const isl of islands) {
      if (!isl.bbox) continue;
      if (lat < isl.bbox.minLat || lat > isl.bbox.maxLat) continue;
      if (lng < isl.bbox.minLng || lng > isl.bbox.maxLng) continue;
      if (pointInPolygon([lat, lng], isl.polygon)) return true;
    }
    return false;
  }
  
  function canSee(a, b, samples = 26) {
    for (let i = 1; i < samples; i++) {
      const t = i / samples;
      const lat = a[0] + (b[0]-a[0])*t;
      const lng = a[1] + (b[1]-a[1])*t;
      if (isBlocked(lat, lng)) return false;
    }
    return true;
  }
  
  // ========================= LOAD DATA ====================================
  function setStatus(txt, col="#cc6d28") {
    const el = document.getElementById('status');
    el.innerText = txt;
    el.style.color = col;
  }
  function setInfo(txt) { document.getElementById('infoBox').innerHTML = txt; }
  function showProgress(p) {
    document.getElementById('progressBar').style.display = 'block';
    document.getElementById('progressFill').style.width = Math.round(p*100)+'%';
  }
  function hideProgress() { document.getElementById('progressBar').style.display = 'none'; }
  const tick = () => new Promise(r => setTimeout(r, 12));
  
  fetch('islands.json')
    .then(r => r.json())
    .then(data => {
      islands = data.islands || [];
      for (const isl of islands) {
        if (!isl.polygon || isl.polygon.length < 3) { isl.skip = true; continue; }
        if (isl.polygon[0] !== isl.polygon[isl.polygon.length-1])
          isl.polygon.push(isl.polygon[0]);
        const lats = isl.polygon.map(p=>p[0]);
        const lngs = isl.polygon.map(p=>p[1]);
        isl.bbox = {
          minLat: Math.min(...lats)-0.02, maxLat: Math.max(...lats)+0.02,
          minLng: Math.min(...lngs)-0.02, maxLng: Math.max(...lngs)+0.02
        };
        L.polygon(isl.polygon, { color:'#e67e22', weight:1.2, fillOpacity:0.2, fillColor:'#c0392b', interactive:false }).addTo(map);
      }
      islandsReady = true;
      tryBuildGraph();
      setStatus("✅ Pulau & batasan siap", "#2c7a4d");
    })
    .catch(() => {
      islandsReady = true;
      tryBuildGraph();
      setStatus("⚠️ islands.json tidak ada → asumsi laut bebas", "#f39c12");
      setInfo("⚠️ Data pulau tidak tersedia, rute tanpa batasan daratan (tapi tetap aman)");
    });
  
  fetch('waypoint.json')
    .then(r => r.json())
    .then(data => {
      waypoints = (data.waypoints || data || []).filter(w => w.lat && w.lng);
      setStatus(`📍 ${waypoints.length} waypoint laut dimuat`, "#2f7f5f");
      tryBuildGraph();
    })
    .catch(() => {
      setStatus("⚠️ waypoint.json gagal, rute tidak bisa dihitung", "#e67e22");
      wpReady = false;
    });
  
  function tryBuildGraph() {
    if (!islandsReady || waypoints.length === 0 || (wpGraph && Object.keys(wpGraph).length > 0)) return;
    buildWaypointGraph();
  }
  
  function buildWaypointGraph() {
    setStatus("🔗 Membangun graf waypoint maritim...", "#f39c12");
    wpGraph = {};
    for (let i = 0; i < waypoints.length; i++) {
      wpGraph[i] = [];
      const dists = [];
      for (let j = 0; j < waypoints.length; j++) {
        if (i === j) continue;
        const d = dist([waypoints[i].lat, waypoints[i].lng], [waypoints[j].lat, waypoints[j].lng]);
        if (d <= WP_CONNECT_RADIUS) dists.push({ j, d });
      }
      dists.sort((a,b) => a.d - b.d);
      for (const { j } of dists.slice(0, WP_K_NEAR)) {
        const a = [waypoints[i].lat, waypoints[i].lng];
        const b = [waypoints[j].lat, waypoints[j].lng];
        if (!islands.length || canSee(a, b, 18)) {
          if (!wpGraph[i].includes(j)) wpGraph[i].push(j);
          if (!wpGraph[j]) wpGraph[j] = [];
          if (!wpGraph[j].includes(i)) wpGraph[j].push(i);
        }
      }
    }
    wpReady = true;
    setStatus(`✅ Graf siap · ${waypoints.length} titik waypoint tersembunyi`, "#2e7d64");
    setInfo(`🌐 Graf maritim dengan ${waypoints.length} node. Siap routing.`);
  }
  
  function findNearestWaypoints(coord, k = 10) {
    return waypoints.map((wp, i) => ({ i, d: dist(coord, [wp.lat, wp.lng]) })).sort((a,b)=>a.d-b.d).slice(0,k);
  }
  function pickReachable(coord, candidates) {
    const reachable = candidates.filter(({ i }) => canSee(coord, [waypoints[i].lat, waypoints[i].lng], 24));
    if (reachable.length >= 1) return reachable.slice(0, 4);
    return candidates.slice(0, 2);
  }
  
  // A* dengan virtual node
  class MinHeap {
    constructor() { this.h = []; }
    push(item) { this.h.push(item); this._up(this.h.length-1); }
    pop() {
      const top = this.h[0], last = this.h.pop();
      if (this.h.length) { this.h[0] = last; this._down(0); }
      return top;
    }
    _up(i) {
      while(i>0) { const p=(i-1)>>1; if(this.h[p][0]<=this.h[i][0]) break; [this.h[p],this.h[i]]=[this.h[i],this.h[p]]; i=p; }
    }
    _down(i) {
      const n=this.h.length;
      while(true) {
        let s=i, l=2*i+1, r=2*i+2;
        if(l<n && this.h[l][0]<this.h[s][0]) s=l;
        if(r<n && this.h[r][0]<this.h[s][0]) s=r;
        if(s===i) break;
        [this.h[i],this.h[s]]=[this.h[s],this.h[i]]; i=s;
      }
    }
    get size() { return this.h.length; }
  }
  
  function astarWithVirtual(srcId, dstId, extraEdges, coordOf) {
    const heap = new MinHeap();
    heap.push([0, srcId]);
    const g = new Map([[srcId, 0]]);
    const came = new Map();
    const vis = new Set();
    let iter=0;
    while(heap.size && iter++<MAX_ITER) {
      const [,cur] = heap.pop();
      if(vis.has(cur)) continue;
      vis.add(cur);
      if(cur === dstId) {
        const path = [];
        let c = cur;
        while(came.has(c)) { path.push(c); c = came.get(c); }
        path.push(srcId);
        return path.reverse();
      }
      const neighbors = [...(extraEdges[cur]||[]), ...(typeof cur === 'number' ? (wpGraph[cur]||[]) : [])];
      for(const nb of neighbors) {
        if(vis.has(nb)) continue;
        const ng = (g.get(cur)||0) + dist(coordOf(cur), coordOf(nb));
        if(ng < (g.get(nb) ?? Infinity)) {
          g.set(nb, ng);
          came.set(nb, cur);
          const h = dist(coordOf(nb), coordOf(dstId));
          heap.push([ng + h, nb]);
        }
      }
    }
    return null;
  }
  
  async function runRoute() {
    if (!start || !end) { alert("⚠️ Tentukan START dan FINISH dulu!"); return; }
    if (isRouting) return;
    if (!wpReady || waypoints.length===0) { alert("Data waypoint belum siap, tunggu sebentar."); return; }
    isRouting = true;
    showProgress(0.1);
    setStatus("🔍 Mencari waypoint terdekat...", "#f39c12");
    await tick();
    if (isBlocked(start[0], start[1])) { alert("START di daratan! pilih di laut."); setStatus("❌ START daratan","red"); isRouting=false; hideProgress(); return; }
    if (isBlocked(end[0], end[1])) { alert("FINISH di daratan!"); setStatus("❌ FINISH daratan","red"); isRouting=false; hideProgress(); return; }
    
    const startCands = findNearestWaypoints(start, 14);
    const endCands = findNearestWaypoints(end, 14);
    const startWPs = pickReachable(start, startCands);
    const endWPs = pickReachable(end, endCands);
    if (!startWPs.length || !endWPs.length) {
      setStatus("❌ Tidak terhubung ke waypoint", "red");
      setInfo("Pilih titik lebih dekat jalur pelayaran.");
      isRouting=false; hideProgress(); return;
    }
    showProgress(0.35);
    const extraEdges = { 'S': [], 'E': [] };
    for (const {i} of startWPs) { extraEdges['S'].push(i); if(!extraEdges[i]) extraEdges[i]=[]; extraEdges[i].push('S'); }
    for (const {i} of endWPs) { extraEdges['E'].push(i); if(!extraEdges[i]) extraEdges[i]=[]; extraEdges[i].push('E'); }
    if(startWPs.some(s=>endWPs.some(e=>e.i===s.i))){ extraEdges['S'].push('E'); extraEdges['E'].push('S'); }
    const coordOf = id => {
      if(id==='S') return start;
      if(id==='E') return end;
      return [waypoints[id].lat, waypoints[id].lng];
    };
    const pathIds = astarWithVirtual('S','E', extraEdges, coordOf);
    showProgress(0.85);
    if (!pathIds || pathIds.length<2) {
      if(canSee(start, end, 45)) {
        drawRoute([start,end]);
        const km = distKm(start,end).toFixed(1);
        const nm = (distKm(start,end)/1.852).toFixed(0);
        setStatus(`✅ Jalur Langsung: ${km} km (${nm} nm)`, "#2ecc71");
        setInfo("Rute LOS langsung tanpa waypoint (laut terbuka).");
      } else {
        setStatus("❌ Rute tidak ditemukan (blokade daratan)", "red");
        setInfo("Tidak ada koneksi antar waypoint, coba koordinat lain.");
      }
      showProgress(1); setTimeout(hideProgress,500); isRouting=false; return;
    }
    const coords = pathIds.map(id=>coordOf(id));
    drawRoute(coords);
    let totalKm=0;
    for(let i=1;i<coords.length;i++) totalKm += distKm(coords[i-1],coords[i]);
    const nm = (totalKm/1.852).toFixed(0);
    const wpCount = pathIds.filter(id=>id!=='S'&&id!=='E').length;
    setStatus(`✅ ${totalKm.toFixed(1)} km · ${nm} nm`, "#2c8c6e");
    setInfo(`🎯 Rute via ${wpCount} waypoint internal, total ${coords.length} segmen. Jarak ${totalKm.toFixed(1)} km.`);
    showProgress(1);
    setTimeout(hideProgress,600);
    isRouting=false;
  }
  
  function drawRoute(coords) {
    if(routeLine) map.removeLayer(routeLine);
    routeLine = L.polyline(coords, { color: '#1f85c7', weight: 5, opacity: 0.95, lineJoin: 'round' }).addTo(map);
    map.fitBounds(routeLine.getBounds(), { padding: [50,50] });
  }
  
  function updateStartMarker(lat,lng){
    if(startMarker) map.removeLayer(startMarker);
    const icon = L.divIcon({ html: `<span style="font-size:28px;">🚢</span>`, iconSize: [28,28], className: '', iconAnchor: [14,28] });
    startMarker = L.marker([lat,lng], { icon }).addTo(map).bindPopup("⚓ START").openPopup();
  }
  function updateEndMarker(lat,lng){
    if(endMarker) map.removeLayer(endMarker);
    const icon = L.divIcon({ html: `<span style="font-size:28px;">🏁</span>`, iconSize: [28,28], className: '', iconAnchor: [14,28] });
    endMarker = L.marker([lat,lng], { icon }).addTo(map).bindPopup("🏆 FINISH");
  }
  
  function applyStartFromInput(){
    let lat = parseFloat(document.getElementById('startLat').value);
    let lng = parseFloat(document.getElementById('startLng').value);
    if(isNaN(lat)||isNaN(lng)){ alert("Masukkan angka valid untuk START"); return; }
    start=[lat,lng];
    updateStartMarker(lat,lng);
    setStatus(`✅ Start: ${lat.toFixed(5)}, ${lng.toFixed(5)}`, "#1f7a5c");
    if(routeLine){ map.removeLayer(routeLine); routeLine=null; }
  }
  function applyEndFromInput(){
    let lat = parseFloat(document.getElementById('endLat').value);
    let lng = parseFloat(document.getElementById('endLng').value);
    if(isNaN(lat)||isNaN(lng)){ alert("Masukkan angka valid untuk FINISH"); return; }
    end=[lat,lng];
    updateEndMarker(lat,lng);
    setStatus(`✅ Finish: ${lat.toFixed(5)}, ${lng.toFixed(5)}`, "#4a7c9c");
    if(routeLine){ map.removeLayer(routeLine); routeLine=null; }
  }
  
  function setModeSelection(m) {
    if(isRouting) return;
    mode = m;
    setStatus(`🖱️ Klik di peta untuk menentukan ${mode==='start'?'START':'FINISH'}`, "#2266aa");
  }
  
  function clearAll(){
    if(isRouting) return;
    if(routeLine) map.removeLayer(routeLine);
    if(startMarker) map.removeLayer(startMarker);
    if(endMarker) map.removeLayer(endMarker);
    start=end=null; routeLine=startMarker=endMarker=null; mode=null;
    document.getElementById('startLat').value='';
    document.getElementById('startLng').value='';
    document.getElementById('endLat').value='';
    document.getElementById('endLng').value='';
    setStatus("Reset total. Semua koordinat dikosongkan.","#447799");
    setInfo("🗑️ Data dihapus. Masukkan koordinat atau pilih di peta.");
  }
  
  map.on('click', e=>{
    if(!mode || isRouting) return;
    const lat=e.latlng.lat, lng=e.latlng.lng;
    if(islands.length && isBlocked(lat,lng)){ alert("❌ Titik di daratan! Pilih di laut."); return; }
    if(mode==='start'){
      start=[lat,lng];
      updateStartMarker(lat,lng);
      document.getElementById('startLat').value=lat.toFixed(6);
      document.getElementById('startLng').value=lng.toFixed(6);
      setStatus(`📍 Start dari peta: ${lat.toFixed(5)}, ${lng.toFixed(5)}`,"#368f6b");
    } else {
      end=[lat,lng];
      updateEndMarker(lat,lng);
      document.getElementById('endLat').value=lat.toFixed(6);
      document.getElementById('endLng').value=lng.toFixed(6);
      setStatus(`🏁 Finish dari peta: ${lat.toFixed(5)}, ${lng.toFixed(5)}`,"#667fa0");
    }
    if(routeLine){ map.removeLayer(routeLine); routeLine=null; }
    mode=null;
  });
  
  // ======================= PANEL COLLAPSE / EXPAND (RESPONSIF) ==================
  const panel = document.getElementById('routePanel');
  const toggleBtn = document.getElementById('togglePanelBtn');
  const panelHeader = document.getElementById('panelHeader');
  function togglePanel() {
    panel.classList.toggle('collapsed');
    toggleBtn.innerText = panel.classList.contains('collapsed') ? '▲' : '▼';
  }
  toggleBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePanel(); });
  panelHeader.addEventListener('click', (e) => { if(e.target !== toggleBtn && !toggleBtn.contains(e.target)) togglePanel(); });
  
  // Event binding utama
  document.getElementById('applyStartBtn').addEventListener('click', applyStartFromInput);
  document.getElementById('applyEndBtn').addEventListener('click', applyEndFromInput);
  document.getElementById('pickStartMapBtn').addEventListener('click', ()=>setModeSelection('start'));
  document.getElementById('pickEndMapBtn').addEventListener('click', ()=>setModeSelection('end'));
  document.getElementById('modeStartBtn').addEventListener('click', ()=>setModeSelection('start'));
  document.getElementById('modeEndBtn').addEventListener('click', ()=>setModeSelection('end'));
  document.getElementById('runRouteBtn').addEventListener('click', runRoute);
  document.getElementById('clearAllBtn').addEventListener('click', clearAll);
  
  window.addEventListener('load', ()=>{
    setStatus("🌊 Marine Router siap. Pilih titik di peta atau input koordinat.", "#2f9e6b");
  });
</script>
</body>
</html>
