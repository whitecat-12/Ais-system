<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal Final (Smooth + Anti Lag)</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    button {
      margin: 5px;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="panel">
  <button onclick="setMode('start')">Start</button>
  <button onclick="setMode('end')">End</button>
  <button onclick="runRoute()">Cari Rute</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==========================
// MAP
// ==========================
var map = L.map('map').setView([-7,110],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ==========================
// STATE
// ==========================
let islands = [];
let mode = null;
let start = null;
let end = null;
let startMarker, endMarker, routeLine;

// ==========================
// LOAD JSON
// ==========================
fetch('islands.json')
.then(res => res.json())
.then(data => {

  islands = data.islands;

  islands.forEach(island => {
    island.polygon.push(island.polygon[0]);

    L.polygon(island.polygon, {
      color:'red'
    }).addTo(map);
  });

});

// ==========================
// MODE
// ==========================
function setMode(m){
  mode = m;
}

// ==========================
// CLICK MAP
// ==========================
map.on('click', function(e){

  let p = [e.latlng.lat, e.latlng.lng];

  if(mode === 'start'){
    start = p;
    if(startMarker) map.removeLayer(startMarker);
    startMarker = L.marker(p).addTo(map).bindPopup("Start");
  }

  if(mode === 'end'){
    end = p;
    if(endMarker) map.removeLayer(endMarker);
    endMarker = L.marker(p).addTo(map).bindPopup("End");
  }

});

// ==========================
// POINT IN POLYGON
// ==========================
function pointInPolygon(point, vs){
  let x = point[0], y = point[1];
  let inside = false;

  for(let i=0, j=vs.length-1; i<vs.length; j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];

    let intersect = ((yi>y)!=(yj>y)) &&
      (x < (xj-xi)*(y-yi)/(yj-yi)+xi);

    if(intersect) inside = !inside;
  }

  return inside;
}

// ==========================
// BLOCK CHECK (CEPAT)
// ==========================
function isBlocked(point){

  let buffer = 0.1;

  for(let island of islands){

    if(pointInPolygon(point, island.polygon)){
      return true;
    }

    for(let p of island.polygon){
      if(Math.hypot(point[0]-p[0], point[1]-p[1]) < buffer){
        return true;
      }
    }
  }

  return false;
}

// ==========================
// GRID OPTIMAL
// ==========================
let step = 0.1;

function toKey(p){
  return p[0].toFixed(2)+","+p[1].toFixed(2);
}

// ==========================
// A*
// ==========================
function astar(start,end){

  let open=[start];
  let cameFrom={};
  let g={}, f={};

  g[toKey(start)] = 0;
  f[toKey(start)] = dist(start,end);

  let maxIter = 5000;
  let iter = 0;

  while(open.length && iter < maxIter){

    iter++;

    open.sort((a,b)=>f[toKey(a)]-f[toKey(b)]);
    let cur = open.shift();

    if(dist(cur,end) < step){
      return reconstruct(cameFrom,cur);
    }

    for(let n of neighbors(cur)){

      if(isBlocked(n)) continue;

      let key = toKey(n);
      let temp = g[toKey(cur)] + dist(cur,n);

      if(g[key] === undefined || temp < g[key]){
        cameFrom[key] = cur;
        g[key] = temp;
        f[key] = temp + dist(n,end);

        if(!open.find(p => toKey(p) === key)){
          open.push(n);
        }
      }
    }
  }

  return [];
}

// ==========================
// 16 ARAH (HALUS + CEPAT)
// ==========================
function neighbors(p){
  let result = [];
  let directions = 16;

  for(let i = 0; i < directions; i++){
    let angle = (2 * Math.PI / directions) * i;

    let dx = step * Math.cos(angle);
    let dy = step * Math.sin(angle);

    result.push([
      p[0] + dx,
      p[1] + dy
    ]);
  }

  return result;
}

// ==========================
// DISTANCE
// ==========================
function dist(a,b){
  return Math.hypot(a[0]-b[0], a[1]-b[1]);
}

// ==========================
// RECONSTRUCT PATH
// ==========================
function reconstruct(cameFrom,cur){
  let path=[cur];

  while(cameFrom[toKey(cur)]){
    cur = cameFrom[toKey(cur)];
    path.push(cur);
  }

  return path.reverse();
}

// ==========================
// SMOOTH RINGAN
// ==========================
function smoothPath(path){

  let smooth = [];

  for (let i = 0; i < path.length - 1; i++) {

    let a = path[i];
    let b = path[i+1];

    smooth.push(a);
    smooth.push([
      (a[0]+b[0])/2,
      (a[1]+b[1])/2
    ]);
  }

  smooth.push(path[path.length-1]);

  return smooth;
}

// ==========================
// RUN ROUTE
// ==========================
function runRoute(){

  if(islands.length === 0){
    alert("Data pulau belum load!");
    return;
  }

  if(!start || !end){
    alert("Pilih start & end dulu!");
    return;
  }

  let rawPath = astar(start,end);

  if(rawPath.length === 0){
    alert("Rute tidak ditemukan!");
    return;
  }

  let path = smoothPath(rawPath);

  if(routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(path,{
    color:'blue',
    weight:4
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

// ==========================
// RESET
// ==========================
function resetAll(){

  if(startMarker) map.removeLayer(startMarker);
  if(endMarker) map.removeLayer(endMarker);
  if(routeLine) map.removeLayer(routeLine);

  start = null;
  end = null;
}

</script>

</body>
</html>
