<!DOCTYPE html>
<html>
<head>
  <title>Routing Kapal SUPER FAST (Hybrid AI)</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div class="panel">
  <button onclick="setMode('start')">Start</button>
  <button onclick="setMode('end')">End</button>
  <button onclick="runRoute()">Cari Rute</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==========================
var map = L.map('map').setView([-7,110],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ==========================
let islands = [];
let mode = null;
let start = null;
let end = null;
let startMarker, endMarker, routeLine;

// ==========================
fetch('islands.json')
.then(res => res.json())
.then(data => {
  islands = data.islands;

  islands.forEach(i=>{
    i.polygon.push(i.polygon[0]);
    L.polygon(i.polygon,{color:'red'}).addTo(map);
  });
});

// ==========================
function setMode(m){ mode = m; }

map.on('click', e=>{
  let p=[e.latlng.lat,e.latlng.lng];

  if(mode==='start'){
    start=p;
    if(startMarker) map.removeLayer(startMarker);
    startMarker=L.marker(p).addTo(map);
  }

  if(mode==='end'){
    end=p;
    if(endMarker) map.removeLayer(endMarker);
    endMarker=L.marker(p).addTo(map);
  }
});

// ==========================
// GEOMETRY
// ==========================
function pointInPolygon(p, vs){
  let x=p[0], y=p[1], inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0], yi=vs[i][1];
    let xj=vs[j][0], yj=vs[j][1];

    let intersect=((yi>y)!=(yj>y)) &&
      (x<(xj-xi)*(y-yi)/(yj-yi)+xi);

    if(intersect) inside=!inside;
  }
  return inside;
}

function isBlocked(p){
  for(let isl of islands){
    if(pointInPolygon(p, isl.polygon)) return true;
  }
  return false;
}

// ==========================
// DIRECT PATH CHECK 🔥
// ==========================
function directPath(a,b){
  let steps=30;

  for(let i=0;i<=steps;i++){
    let t=i/steps;
    let p=[
      a[0]+(b[0]-a[0])*t,
      a[1]+(b[1]-a[1])*t
    ];
    if(isBlocked(p)) return false;
  }
  return true;
}

// ==========================
// SIMPLE A* (LIMITED)
// ==========================
let step=0.12;

function neighbors(p){
  return [
    [p[0]+step,p[1]],
    [p[0]-step,p[1]],
    [p[0],p[1]+step],
    [p[0],p[1]-step],
    [p[0]+step,p[1]+step],
    [p[0]-step,p[1]-step],
    [p[0]+step,p[1]-step],
    [p[0]-step,p[1]+step]
  ];
}

function dist(a,b){
  return Math.hypot(a[0]-b[0],a[1]-b[1]);
}

function astar(start,end){

  let open=[start];
  let came={};
  let g={};

  g[start]=0;

  let loop=0;

  while(open.length && loop<3000){ // LIMIT 🔥
    loop++;

    let cur=open.shift();

    if(dist(cur,end)<step){
      return [start,end];
    }

    for(let n of neighbors(cur)){
      if(isBlocked(n)) continue;

      if(!g[n]){
        g[n]=1;
        open.push(n);
      }
    }
  }

  return [start,end];
}

// ==========================
// SMOOTH
// ==========================
function smooth(path){
  let out=[];

  for(let i=0;i<path.length-1;i++){
    let a=path[i], b=path[i+1];

    for(let t=0;t<=1;t+=0.1){
      out.push([
        a[0]+(b[0]-a[0])*t,
        a[1]+(b[1]-a[1])*t
      ]);
    }
  }

  return out;
}

// ==========================
function runRoute(){

  if(!start||!end){
    alert("Pilih titik!");
    return;
  }

  let path;

  // 🔥 PRIORITAS: langsung tembus
  if(directPath(start,end)){
    path=[start,end];
  } else {
    path=astar(start,end);
  }

  path=smooth(path);

  if(routeLine) map.removeLayer(routeLine);

  routeLine=L.polyline(path,{
    color:'blue',
    weight:4
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

// ==========================
function resetAll(){
  if(startMarker) map.removeLayer(startMarker);
  if(endMarker) map.removeLayer(endMarker);
  if(routeLine) map.removeLayer(routeLine);

  start=null;
  end=null;
}
</script>

</body>
</html>
